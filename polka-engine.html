<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Sprite Open World - Fixed Physics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Luckiest Guy', cursive; 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }
        
        #game-viewport {
            position: relative;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas { 
            display: block; 
            width: 100% !important;
            height: 100% !important;
        }
        
        .full-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
        }

        #menu-screen {
            background: url('https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-start-screen.png');
            background-color: #1e3a8a;
            background-size: cover;
            background-position: center;
            z-index: 300;
            pointer-events: auto;
            justify-content: flex-end;
            padding-bottom: 8%;
        }

        .menu-card {
            background: rgba(0, 0, 0, 0.7);
            padding: 1rem 2rem;
            border-radius: 50px;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: row;
            gap: 2rem;
        }

        .menu-btn {
            padding: 0.5rem 1.5rem;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.5rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s;
            text-shadow: 2px 2px 0px #000;
        }

        .menu-btn:hover { transform: scale(1.1); color: #22d3ee; }

        #options-overlay {
            background: rgba(0,0,0,0.85);
            z-index: 500;
            display: none;
            pointer-events: auto;
        }

        #game-ui {
            position: absolute;
            top: 4%;
            left: 4%;
            color: white;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
            z-index: 200;
        }

        #fade-overlay {
            position: absolute;
            inset: 0;
            background: black;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            z-index: 1000;
        }
    </style>
</head>
<body onclick="tryStartMenuMusic()">

    <audio id="menu-music" loop>
        <source src="https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-theme.mp3" type="audio/mpeg">
    </audio>
    <audio id="game-music" loop>
        <source src="https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/Whispers_of_the_Verdant_Keep.mp3" type="audio/mpeg">
    </audio>

    <div id="game-viewport">
        <div id="fade-overlay"></div>

        <div id="menu-screen" class="full-overlay">
            <div class="menu-card">
                <button onclick="onNewGame()" class="menu-btn">New Game</button>
                <button onclick="openOptions()" class="menu-btn">Options</button>
            </div>
        </div>

        <div id="options-overlay" class="full-overlay">
            <div class="bg-slate-800 p-8 rounded-3xl border-4 border-cyan-400 flex flex-col gap-4">
                <h2 class="text-3xl text-cyan-400 text-center">Settings</h2>
                <button onclick="toggleWireframe()" id="wireframe-btn" class="p-3 bg-yellow-600 text-white rounded-xl">Debug View: OFF</button>
                <button onclick="closeOptions()" class="p-3 bg-red-600 text-white rounded-xl">Close</button>
            </div>
        </div>

        <div id="game-ui" class="hidden">
            <div id="zone-display" class="text-3xl text-cyan-400">SpriteVille</div>
            <div id="stats" class="text-xl">Gold: <span id="gold-val">0</span></div>
        </div>
    </div>

    <script>
        // --- CONSTANTS ---
        const TARGET_ASPECT = 16 / 9;
        const VIEW_SIZE = 4.2;
        const GRAVITY = -0.015;
        const JUMP_FORCE = 0.35;
        
        // COLLISION CONSTANTS
        // The grass art is 2 units tall. If center is at 0, top is at 1.0.
        // We set our physical floor surface exactly at Y = 1.0.
        const PHYSICAL_FLOOR_Y = 1.0; 

        let scene, camera, renderer, clock;
        let player, worldGroup, platforms = [], enemies = [], projectiles = [];
        let keys = {};
        let gameActive = false, isPaused = false, wireframeMode = false;
        let stats = { gold: 0 };

        const textureLoader = new THREE.TextureLoader();
        let MATERIALS = {};

        const SPRITES = {
            playerStand: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-standing-sprite-sheet-2x1-140Px140P.png',
            playerRunRight: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-run-cycle-right-12fps.png',
            playerRunLeft: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-run-cycle-left-12fps.png',
            grass: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/grass-tilesheet-944x267-gemini.png',
            brick: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/brick185x185-gemini.png',
            enemy: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/129.png'
        };

        function createSafeMaterial(url, tilesX = 1) {
            const mat = new THREE.SpriteMaterial({ transparent: true });
            textureLoader.load(url, (t) => {
                t.magFilter = THREE.NearestFilter;
                if (tilesX > 1) t.repeat.set(1/tilesX, 1);
                mat.map = t;
            });
            return mat;
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            
            camera = new THREE.OrthographicCamera(-VIEW_SIZE * TARGET_ASPECT, VIEW_SIZE * TARGET_ASPECT, VIEW_SIZE, -VIEW_SIZE, 0.1, 1000);
            camera.position.set(0, 0, 20);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            document.getElementById('game-viewport').appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            clock = new THREE.Clock();

            MATERIALS.playerStand = createSafeMaterial(SPRITES.playerStand, 2);
            MATERIALS.playerRunRight = createSafeMaterial(SPRITES.playerRunRight, 11);
            MATERIALS.playerRunLeft = createSafeMaterial(SPRITES.playerRunLeft, 11);
            MATERIALS.enemy = createSafeMaterial(SPRITES.enemy);

            worldGroup = new THREE.Group();
            scene.add(worldGroup);

            buildWorld();
            createPlayer();

            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('resize', onResize);
            onResize();
            animate();
        }

        function createPlayer() {
            player = new THREE.Sprite(MATERIALS.playerStand);
            player.scale.set(2.2, 2.2, 1);
            // SPAWN POSITION: Well above the floor to allow gravity to seat the player
            player.position.set(0, PHYSICAL_FLOOR_Y + 5, 2);
            player.userData = {
                vy: 0,
                onGround: false,
                width: 0.6,
                height: 1.1,
                facingRight: true,
                currentAnim: 'stand',
                animFrame: 0,
                animTimer: 0
            };
            
            // Debug Hitbox
            player.userData.helper = new THREE.Mesh(
                new THREE.BoxGeometry(player.userData.width, player.userData.height, 0.1),
                new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true })
            );
            scene.add(player.userData.helper);
            scene.add(player);
        }

        function buildWorld() {
            // Visual Grass (Z=0)
            textureLoader.load(SPRITES.grass, (t) => {
                for(let x = -100; x < 100; x += 2) {
                    const tex = t.clone();
                    tex.magFilter = THREE.NearestFilter;
                    tex.repeat.set(0.25, 1);
                    tex.offset.x = 0.75; // Using the "flat" grass tile
                    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
                    const s = new THREE.Sprite(mat);
                    s.scale.set(2, 2, 1);
                    s.position.set(x, 0, 0); // Center at 0, top at 1.0
                    worldGroup.add(s);
                }
            });

            // Physical Floor (Collider)
            // We make the collider's TOP edge align with the grass top (1.0)
            // Center is at 0, Height is 2, so Top is 1.0.
            addPlatform(0, 0, 1000, 2);

            // Floating Platforms
            for(let i=0; i<20; i++) {
                addPlatform(Math.random()*80 - 40, PHYSICAL_FLOOR_Y + 3 + Math.random()*4, 4, 0.8);
            }
        }

        function addPlatform(x, y, w, h) {
            const p = { x, y, w, h };
            const helper = new THREE.Mesh(
                new THREE.BoxGeometry(w, h, 0.2),
                new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true })
            );
            helper.position.set(x, y, 1);
            worldGroup.add(helper);
            p.helper = helper;
            platforms.push(p);
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!gameActive || isPaused) {
                renderer.render(scene, camera);
                return;
            }

            // Movement Logic
            const speed = 0.12;
            let moveX = 0;
            if(keys['KeyA']) { moveX -= speed; player.userData.facingRight = false; }
            if(keys['KeyD']) { moveX += speed; player.userData.facingRight = true; }

            // Apply X Movement with Collision
            if(moveX !== 0) {
                player.position.x += moveX;
                checkCollisions('x');
            }

            // Apply Gravity and Y Movement
            player.userData.vy += GRAVITY;
            player.position.y += player.userData.vy;
            player.userData.onGround = false;
            checkCollisions('y');

            if(keys['Space'] && player.userData.onGround) {
                player.userData.vy = JUMP_FORCE;
                player.userData.onGround = false;
            }

            // Animation
            updateAnimation(moveX);

            // Camera Follow
            camera.position.x += (player.position.x - camera.position.x) * 0.1;
            camera.position.y += (player.position.y - camera.position.y) * 0.1;

            // Debug Helper
            player.userData.helper.position.copy(player.position);
            player.userData.helper.visible = wireframeMode;
            platforms.forEach(p => p.helper.visible = wireframeMode);

            renderer.render(scene, camera);
        }

        function checkCollisions(axis) {
            const pw = player.userData.width / 2;
            const ph = player.userData.height / 2;

            platforms.forEach(p => {
                const tw = p.w / 2;
                const th = p.h / 2;

                if (player.position.x + pw > p.x - tw && 
                    player.position.x - pw < p.x + tw &&
                    player.position.y + ph > p.y - th && 
                    player.position.y - ph < p.y + th) {
                    
                    if (axis === 'x') {
                        if (player.position.x < p.x) player.position.x = p.x - tw - pw;
                        else player.position.x = p.x + tw + pw;
                    } else {
                        if (player.userData.vy < 0) {
                            player.position.y = p.y + th + ph;
                            player.userData.vy = 0;
                            player.userData.onGround = true;
                        } else {
                            player.position.y = p.y - th - ph;
                            player.userData.vy = 0;
                        }
                    }
                }
            });
        }

        function updateAnimation(moveX) {
            let target = moveX === 0 ? 'stand' : (player.userData.facingRight ? 'runRight' : 'runLeft');
            
            if(player.userData.currentAnim !== target) {
                player.userData.currentAnim = target;
                player.material = MATERIALS[target === 'stand' ? 'playerStand' : (target === 'runRight' ? 'playerRunRight' : 'playerRunLeft')];
                player.userData.animFrame = 0;
            }

            if(target !== 'stand') {
                if(++player.userData.animTimer > 5) {
                    player.userData.animFrame = (player.userData.animFrame + 1) % 11;
                    player.userData.animTimer = 0;
                }
                if(player.material.map) player.material.map.offset.x = player.userData.animFrame / 11;
            } else {
                if(player.material.map) player.material.map.offset.x = player.userData.facingRight ? 0.5 : 0;
            }
        }

        function onNewGame() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-ui').classList.remove('hidden');
            gameActive = true;
            if(document.getElementById('game-music').paused) {
                document.getElementById('game-music').play().catch(()=>{});
            }
        }

        function openOptions() { isPaused = true; document.getElementById('options-overlay').style.display = 'flex'; }
        function closeOptions() { isPaused = false; document.getElementById('options-overlay').style.display = 'none'; }
        function toggleWireframe() { wireframeMode = !wireframeMode; document.getElementById('wireframe-btn').innerText = `Debug View: ${wireframeMode ? 'ON' : 'OFF'}`; }
        function tryStartMenuMusic() { if(!gameActive) document.getElementById('menu-music').play().catch(()=>{}); }

        function onResize() {
            const viewport = document.getElementById('game-viewport');
            const w = window.innerWidth, h = window.innerHeight;
            const aspect = w / h;
            let finalW, finalH;
            if (aspect > TARGET_ASPECT) {
                finalH = h; finalW = h * TARGET_ASPECT;
            } else {
                finalW = w; finalH = w / TARGET_ASPECT;
            }
            viewport.style.width = finalW + 'px';
            viewport.style.height = finalH + 'px';
            renderer.setSize(finalW, finalH);
        }

        window.onload = init;
    </script>
</body>
</html>
