<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Platformer Creator - BOSS BATTLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            background: #87CEEB;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            margin: auto;
        }
        .ui-panel {
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 15px;
            border-radius: 12px;
            pointer-events: auto;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #game-overlay, #intro-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 100;
        }
        #intro-overlay {
            background: black;
            z-index: 200;
        }
        #game-overlay {
            display: none;
        }
        #boss-ui {
            display: none;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            text-align: center;
        }
        .hp-bar {
            height: 12px;
            background: #441111;
            border: 2px solid white;
            border-radius: 6px;
            overflow: hidden;
        }
        #hp-fill {
            height: 100%;
            background: #ff0000;
            width: 100%;
            transition: width 0.3s ease;
        }
        video {
            max-width: 90%;
            max-height: 80%;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center h-screen">

    <div id="game-container" class="relative">
        <!-- Intro Video Overlay -->
        <div id="intro-overlay">
            <video id="intro-video" preload="auto">
                <source src="https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/logo-melting.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <div class="mt-6 flex gap-4">
                <button id="start-btn" onclick="startIntro()" class="px-8 py-3 bg-cyan-500 text-white font-black rounded-full hover:bg-cyan-400 uppercase tracking-widest shadow-lg transition-all">Play Intro</button>
                <button id="skip-btn" onclick="closeIntro()" class="px-8 py-3 bg-white/10 text-white font-black rounded-full hover:bg-white/20 uppercase tracking-widest border border-white/20 transition-all">Skip</button>
            </div>
            <p class="mt-4 text-[10px] opacity-50 uppercase tracking-widest">Replace video URL in code for custom intro</p>
        </div>

        <canvas id="gameCanvas"></canvas>
        
        <div id="boss-ui">
            <div class="text-white font-black uppercase text-xs mb-1 tracking-widest">Gyarados Boss</div>
            <div class="hp-bar"><div id="hp-fill"></div></div>
        </div>

        <div id="game-overlay">
            <h1 id="overlay-title" class="text-6xl font-black mb-8 tracking-tighter italic text-center">GAME OVER</h1>
            <div id="overlay-sub" class="text-xl mb-8 opacity-80 font-bold uppercase tracking-widest text-center"></div>
            <button id="overlay-btn" onclick="resetGame()" class="px-10 py-4 bg-white text-black font-black rounded-full hover:bg-yellow-400 transition-all active:scale-90 uppercase tracking-widest shadow-lg">Try Again</button>
        </div>

        <div class="absolute top-4 left-4 ui-panel flex flex-col gap-1">
            <div class="text-xl font-black italic uppercase text-yellow-400">Sprite Engine</div>
            <div id="level-display" class="text-sm font-bold text-white uppercase tracking-widest mb-1">Level 1: Green Hills</div>
            <div class="h-px bg-white/20 my-1"></div>
            <div class="text-[10px] font-bold opacity-60 uppercase tracking-wider">Arrows / WASD: Move</div>
            <div class="text-[10px] font-bold opacity-60 uppercase tracking-wider">Space / W: Jump</div>
            <div class="text-[10px] font-bold text-cyan-400 uppercase tracking-wider">F / Enter: Shoot</div>
            <div id="mode-indicator" class="text-cyan-400 font-black text-sm mt-1 uppercase tracking-tighter">Play Mode</div>
            <button onclick="toggleMusic()" id="music-btn" class="mt-2 text-[10px] bg-white/10 hover:bg-white/20 px-2 py-1 rounded border border-white/20 uppercase font-bold tracking-widest">Toggle Music: OFF</button>
        </div>

        <div id="palette" class="absolute top-4 right-4 ui-panel hidden">
            <div class="text-[10px] mb-2 font-black opacity-60 uppercase tracking-widest">Tile Palette</div>
            <div class="flex gap-2">
                <button onclick="setTileType(1)" class="w-10 h-10 bg-[#6D4C41] border-4 border-white rounded-md transition-all"></button>
                <button onclick="setTileType(2)" class="w-10 h-10 bg-[#43A047] border-4 border-transparent rounded-md transition-all"></button>
                <button onclick="setTileType(3)" class="w-10 h-10 bg-[#FFB300] border-4 border-transparent rounded-md transition-all"></button>
                <button onclick="setTileType(4)" class="w-10 h-10 bg-black border-4 border-transparent rounded-md transition-all"></button>
                <button onclick="setTileType(0)" class="w-12 h-10 bg-sky-300 border-2 border-transparent text-black text-[10px] font-black rounded-md flex items-center justify-center">ERASE</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const modeIndicator = document.getElementById('mode-indicator');
        const levelDisplay = document.getElementById('level-display');
        const palette = document.getElementById('palette');
        const overlay = document.getElementById('game-overlay');
        const introOverlay = document.getElementById('intro-overlay');
        const introVideo = document.getElementById('intro-video');
        const overlayTitle = document.getElementById('overlay-title');
        const overlaySub = document.getElementById('overlay-sub');
        const overlayBtn = document.getElementById('overlay-btn');
        const musicBtn = document.getElementById('music-btn');
        const bossUI = document.getElementById('boss-ui');
        const hpFill = document.getElementById('hp-fill');

        // --- INTRO LOGIC ---
        function startIntro() {
            document.getElementById('start-btn').style.display = 'none';
            introVideo.play();
            introVideo.onended = () => {
                closeIntro();
            };
        }

        function closeIntro() {
            introVideo.pause();
            introOverlay.style.display = 'none';
            gameActive = true;
            // Start music automatically if user interacted
            if (!isMusicPlaying) toggleMusic();
        }

        // --- AUDIO ENGINE ---
        let audioCtx = null;
        let isMusicPlaying = false;
        let musicTimer = null;
        let step = 0;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playNote(freq, startTime, duration, type = 'square', vol = 0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, startTime);
            gain.gain.setValueAtTime(vol, startTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(startTime);
            osc.stop(startTime + duration);
        }

        const melody = [261.63, 293.66, 329.63, 349.23, 392.00, 329.63, 261.63, 293.66, 392.00, 349.23, 329.63, 261.63, 293.66, 261.63, 196.00, 261.63];
        const bossMelody = [130.81, 138.59, 130.81, 123.47, 130.81, 138.59, 146.83, 155.56];

        function musicLoop() {
            if (!isMusicPlaying) return;
            const now = audioCtx.currentTime;
            const isBoss = (LEVELS[currentLevelIndex] && LEVELS[currentLevelIndex].isBoss);
            const currentMelody = isBoss ? bossMelody : melody;
            const tempo = isBoss ? 0.12 : 0.15;
            
            if (step % 2 === 0) playNote(currentMelody[step % 4] / 2, now, 0.4, 'triangle', 0.15);
            playNote(currentMelody[step % currentMelody.length], now, 0.2, isBoss ? 'sawtooth' : 'square', 0.05);
            
            step++;
            musicTimer = setTimeout(musicLoop, tempo * 1000);
        }

        function toggleMusic() {
            initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            isMusicPlaying = !isMusicPlaying;
            if (isMusicPlaying) {
                musicBtn.innerText = "Toggle Music: ON";
                musicLoop();
            } else {
                musicBtn.innerText = "Toggle Music: OFF";
                clearTimeout(musicTimer);
            }
        }

        // --- SPRITES ---
        const SPRITES = {
            player: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/25.png', 
            enemy: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/129.png',
            boss: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/130.png',
            brick: 'https://raw.githubusercontent.com/Aris-F/Pixel-Art-Assets/main/Tiles/Brick.png',
            grass: 'https://raw.githubusercontent.com/Aris-F/Pixel-Art-Assets/main/Tiles/Grass.png',
            coin: 'https://raw.githubusercontent.com/Aris-F/Pixel-Art-Assets/main/Items/Coin.png'
        };

        const images = {};
        function loadImages() {
            for (let key in SPRITES) {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.src = SPRITES[key];
                images[key] = img;
            }
        }

        // Physics
        const TILE_SIZE = 40;
        const GRAVITY = 0.7;
        const FRICTION = 0.82;
        const AIR_RES = 0.94;
        const JUMP_FORCE = -14.5;
        const ACCEL = 0.9;
        const MAX_SPEED = 6;
        const COLLISION_MARGIN = 4;

        canvas.width = 800;
        canvas.height = 480;

        let currentLevelIndex = 0;
        let isEditMode = false;
        let selectedTileType = 1;
        let cameraX = 0;
        let gameActive = false; // Start false for intro
        const keys = {};

        const player = {
            x: 100, y: 300, width: 32, height: 32, vx: 0, vy: 0,
            onGround: false, coyoteTime: 0, facingRight: true,
            shootCooldown: 0
        };

        let enemies = [];
        let projectiles = [];
        let boss = null;
        const world = [];
        const ROWS = canvas.height / TILE_SIZE;
        const COLS = 150; 

        const LEVELS = [
            {
                name: "Level 1: Green Hills",
                bgColor: "#87CEEB",
                setup: (w) => {
                    for(let c=0; c<COLS; c++) {
                        w[ROWS-1][c] = 2;
                        if (c > 20 && c % 15 === 0) {
                            w[ROWS-4][c] = 3;
                            spawnEnemy(c * TILE_SIZE, (ROWS - 2) * TILE_SIZE);
                        }
                    }
                    w[ROWS-2][140] = 4;
                }
            },
            {
                name: "Level 2: Floating Islands",
                bgColor: "#4A90E2",
                setup: (w) => {
                    for(let c=0; c<COLS; c++) {
                        if (c % 8 < 4) w[ROWS-1][c] = 1;
                        if (c % 12 === 0 && c > 10) {
                            w[ROWS-4][c] = 1; w[ROWS-4][c+1] = 1;
                            spawnEnemy((c+1) * TILE_SIZE, (ROWS - 5) * TILE_SIZE);
                        }
                        if (c % 15 === 5) w[ROWS-6][c] = 3;
                    }
                    w[ROWS-2][140] = 4;
                }
            },
            {
                name: "Level 3: The Fortress",
                bgColor: "#2C3E50",
                setup: (w) => {
                    for(let c=0; c<COLS; c++) {
                        w[ROWS-1][c] = 1; w[0][c] = 1;
                        if (c % 10 === 0 && c > 5) {
                            for(let r=1; r<ROWS-5; r++) w[r][c] = 1;
                            spawnEnemy(c * TILE_SIZE + 80, (ROWS - 2) * TILE_SIZE);
                        }
                    }
                    w[ROWS-2][140] = 4;
                }
            },
            {
                name: "FINAL BOSS: THE ABYSS",
                bgColor: "#1a1a1a",
                isBoss: true,
                setup: (w) => {
                    for(let c=0; c<30; c++) w[ROWS-1][c] = 1; // Arena
                    boss = { 
                        x: 600, y: 100, width: 120, height: 120, 
                        vx: -2, vy: 0, hp: 10, maxHp: 10, invuln: 0 
                    };
                }
            }
        ];

        function initWorld() {
            enemies = [];
            projectiles = [];
            boss = null;
            bossUI.style.display = 'none';
            for (let r = 0; r < ROWS; r++) {
                world[r] = [];
                for (let c = 0; c < COLS; c++) world[r][c] = 0;
            }
            if (LEVELS[currentLevelIndex]) {
                LEVELS[currentLevelIndex].setup(world);
                canvas.style.background = LEVELS[currentLevelIndex].bgColor;
                levelDisplay.innerText = LEVELS[currentLevelIndex].name;
                if (LEVELS[currentLevelIndex].isBoss) {
                    bossUI.style.display = 'block';
                    hpFill.style.width = '100%';
                }
            }
        }

        function spawnEnemy(x, y) {
            enemies.push({ x, y, width: 32, height: 32, vx: -2.5, dead: false });
        }

        function shoot() {
            if (!gameActive || player.shootCooldown > 0) return;
            const dir = player.facingRight ? 1 : -1;
            projectiles.push({
                x: player.x + (player.facingRight ? player.width : -10),
                y: player.y + player.height / 2 - 4,
                vx: dir * 10,
                width: 12,
                height: 8,
                active: true
            });
            player.shootCooldown = 20;
            playNote(880, audioCtx?.currentTime || 0, 0.05, 'triangle', 0.05);
        }

        function nextLevel() {
            currentLevelIndex++;
            if (currentLevelIndex >= LEVELS.length) victory();
            else resetGame();
        }

        function victory() {
            gameActive = false;
            overlay.style.display = 'flex';
            overlayTitle.innerText = "GRAND VICTORY!";
            overlayTitle.className = "text-6xl font-black mb-4 tracking-tighter italic text-yellow-400";
            overlaySub.innerText = "You defeated the Boss and saved the Pixel World!";
            overlayBtn.innerText = "Replay All";
            currentLevelIndex = 0;
        }

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'KeyF' || e.code === 'Enter') {
                shoot();
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function resetGame() {
            player.x = 100; player.y = 300;
            player.vx = 0; player.vy = 0;
            player.shootCooldown = 0;
            cameraX = 0;
            gameActive = true;
            overlay.style.display = 'none';
            initWorld();
        }

        function update() {
            if (!gameActive) return;

            // Player movement
            const moveLeft = keys['ArrowLeft'] || keys['KeyA'];
            const moveRight = keys['ArrowRight'] || keys['KeyD'];

            if (moveLeft) { player.vx -= ACCEL; player.facingRight = false; }
            else if (moveRight) { player.vx += ACCEL; player.facingRight = true; }
            else { player.vx *= (player.onGround ? FRICTION : AIR_RES); }

            player.vx = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, player.vx));
            player.vy += GRAVITY;

            player.x += player.vx;
            handleCollision(true);
            player.y += player.vy;
            player.onGround = false;
            handleCollision(false);

            if (player.onGround) player.coyoteTime = 8;
            else player.coyoteTime--;

            if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && player.coyoteTime > 0) {
                player.vy = JUMP_FORCE;
                player.coyoteTime = 0;
                player.onGround = false;
            }

            if (player.shootCooldown > 0) player.shootCooldown--;

            // Projectile logic
            projectiles.forEach(p => {
                if (!p.active) return;
                p.x += p.vx;
                
                if (p.x < cameraX || p.x > cameraX + canvas.width) p.active = false;
                
                const tx = Math.floor(p.x / TILE_SIZE);
                const ty = Math.floor(p.y / TILE_SIZE);
                if (world[ty] && world[ty][tx] > 0 && world[ty][tx] !== 4) p.active = false;

                enemies.forEach(en => {
                    if (!en.dead && checkOverlap(p, en)) {
                        en.dead = true;
                        p.active = false;
                        playNote(110, audioCtx?.currentTime || 0, 0.1, 'sawtooth', 0.1);
                    }
                });

                if (boss && boss.invuln === 0 && checkOverlap(p, boss)) {
                    boss.hp--;
                    boss.invuln = 15;
                    p.active = false;
                    hpFill.style.width = (boss.hp / boss.maxHp * 100) + '%';
                    if (boss.hp <= 0) victory();
                    playNote(220, audioCtx?.currentTime || 0, 0.05, 'square', 0.1);
                }
            });
            projectiles = projectiles.filter(p => p.active);

            enemies.forEach(en => {
                if (en.dead) return;
                en.x += en.vx;
                const col = Math.floor((en.vx > 0 ? en.x + en.width : en.x) / TILE_SIZE);
                const row = Math.floor((en.y + en.height / 2) / TILE_SIZE);
                if (world[row] && world[row][col] > 0) en.vx *= -1;

                if (checkOverlap(player, en)) {
                    if (player.vy > 0 && player.y + player.height < en.y + 15) {
                        en.dead = true; player.vy = -10;
                    } else gameOver();
                }
            });

            if (boss) {
                if (boss.invuln > 0) boss.invuln--;
                boss.x += boss.vx;
                boss.vy += 0.2;
                boss.y += boss.vy;

                if (boss.x > player.x + 50) boss.vx = -2.5;
                else if (boss.x < player.x - 50) boss.vx = 2.5;

                if (boss.y + boss.height > (ROWS - 1) * TILE_SIZE) {
                    boss.y = (ROWS - 1) * TILE_SIZE - boss.height;
                    boss.vy = -Math.random() * 5; 
                }

                if (checkOverlap(player, boss)) {
                    if (player.vy > 0 && player.y + player.height < boss.y + 30 && boss.invuln === 0) {
                        boss.hp--;
                        boss.invuln = 60;
                        player.vy = -12;
                        hpFill.style.width = (boss.hp / boss.maxHp * 100) + '%';
                        if (boss.hp <= 0) victory();
                    } else if (boss.invuln === 0) gameOver();
                }
            }

            let targetCam = player.x - canvas.width / 2;
            cameraX += (targetCam - cameraX) * 0.1;
            cameraX = Math.max(0, Math.min(cameraX, COLS * TILE_SIZE - canvas.width));

            if (player.y > canvas.height) gameOver();
        }

        function checkOverlap(a, b) {
            return a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y;
        }

        function gameOver() {
            gameActive = false;
            overlay.style.display = 'flex';
            overlayTitle.innerText = "GAME OVER";
            overlayTitle.className = "text-6xl font-black mb-8 tracking-tighter italic text-red-500";
        }

        function handleCollision(isX) {
            const x1 = Math.floor((isX ? player.x : player.x + COLLISION_MARGIN) / TILE_SIZE);
            const x2 = Math.floor((isX ? player.x + player.width : player.x + player.width - COLLISION_MARGIN) / TILE_SIZE);
            const y1 = Math.floor((isX ? player.y + COLLISION_MARGIN : player.y) / TILE_SIZE);
            const y2 = Math.floor((isX ? player.y + player.height - COLLISION_MARGIN : player.y + player.height) / TILE_SIZE);

            for (let r = y1; r <= y2; r++) {
                for (let c = x1; c <= x2; c++) {
                    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) continue;
                    if (world[r][c] > 0) {
                        if (world[r][c] === 4) { nextLevel(); return; }
                        if (isX) {
                            if (player.vx > 0) player.x = c * TILE_SIZE - player.width;
                            else if (player.vx < 0) player.x = (c + 1) * TILE_SIZE;
                            player.vx = 0;
                        } else {
                            if (player.vy > 0) {
                                player.y = r * TILE_SIZE - player.height;
                                player.onGround = true; player.vy = 0;
                            } else if (player.vy < 0) {
                                player.y = (r + 1) * TILE_SIZE; player.vy = 0;
                            }
                        }
                    }
                }
            }
        }

        function safeDrawImage(img, ...args) {
            if (img && img.complete && img.naturalWidth !== 0) {
                ctx.drawImage(img, ...args);
            } else {
                const [x, y, w, h] = args.length === 4 ? args : [args[0], args[1], TILE_SIZE, TILE_SIZE];
                ctx.fillStyle = '#ff00ff';
                ctx.fillRect(x, y, w || TILE_SIZE, h || TILE_SIZE);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-Math.floor(cameraX), 0);

            for (let r = 0; r < ROWS; r++) {
                for (let c = Math.floor(cameraX/TILE_SIZE); c < Math.floor((cameraX+canvas.width)/TILE_SIZE)+1; c++) {
                    if (c >= COLS) break;
                    const tile = world[r][c];
                    if (tile === 1) safeDrawImage(images.brick, c*TILE_SIZE, r*TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    else if (tile === 2) safeDrawImage(images.grass, c*TILE_SIZE, r*TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    else if (tile === 3) safeDrawImage(images.coin, c*TILE_SIZE, r*TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    else if (tile === 4) {
                        ctx.fillStyle = '#37474F'; ctx.fillRect(c*TILE_SIZE + 18, r*TILE_SIZE, 4, TILE_SIZE);
                        ctx.fillStyle = '#D32F2F'; ctx.fillRect(c*TILE_SIZE + 22, r*TILE_SIZE + 4, 15, 12);
                    }
                }
            }

            enemies.forEach(en => { if (!en.dead) safeDrawImage(images.enemy, en.x, en.y, en.width, en.height); });

            ctx.fillStyle = '#FFFF00';
            projectiles.forEach(p => {
                ctx.fillRect(p.x, p.y, p.width, p.height);
                ctx.shadowBlur = 10;
                ctx.shadowColor = "yellow";
                ctx.fillRect(p.x, p.y, p.width, p.height);
                ctx.shadowBlur = 0;
            });

            if (boss) {
                if (boss.invuln % 10 < 5) {
                    safeDrawImage(images.boss, boss.x, boss.y, boss.width, boss.height);
                }
            }

            if (!player.facingRight) {
                ctx.save(); ctx.translate(player.x + player.width, player.y); ctx.scale(-1, 1);
                safeDrawImage(images.player, 0, 0, player.width, player.height); ctx.restore();
            } else {
                safeDrawImage(images.player, player.x, player.y, player.width, player.height);
            }
            
            ctx.restore();
            update();
            requestAnimationFrame(draw);
        }

        function resize() {
            const ratio = canvas.width / canvas.height;
            let w = window.innerWidth * 0.95, h = w / ratio;
            if (h > window.innerHeight * 0.85) { h = window.innerHeight * 0.85; w = h * ratio; }
            canvas.style.width = Math.floor(w) + 'px'; canvas.style.height = Math.floor(h) + 'px';
        }

        window.addEventListener('resize', resize);
        window.onload = () => { loadImages(); initWorld(); resize(); draw(); };
    </script>
</body>
</html>
