<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Sprite Open World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Luckiest Guy', cursive; }
        canvas { display: block; }
        
        .full-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
        }

        #menu-screen {
            background: url('https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-start-screen.png');
            background-color: #1e3a8a; /* Solid fallback color if image dies */
            background-size: cover;
            background-position: center;
            z-index: 300;
            pointer-events: auto;
            justify-content: flex-end;
            padding-bottom: 8vh;
        }

        .menu-card {
            background: rgba(0, 0, 0, 0.7);
            padding: 1rem 2rem;
            border-radius: 50px;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: row;
            gap: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .menu-btn {
            padding: 0.5rem 1.5rem;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.5rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s;
            text-shadow: 2px 2px 0px #000;
        }

        .menu-btn:hover { transform: scale(1.1); color: #22d3ee; }

        #game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        #shop-ui {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 4px solid #facc15;
            padding: 2rem;
            border-radius: 20px;
            color: white;
            display: none;
            z-index: 500;
            pointer-events: auto;
            min-width: 300px;
        }

        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #333;
        }

        .buy-btn {
            background: #16a34a;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .buy-btn:hover { background: #22c55e; }

        #intro-overlay {
            background: black;
            z-index: 400;
            display: none;
            pointer-events: auto;
        }
        
        #intro-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #interaction-prompt {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            padding: 5px 15px;
            border-radius: 20px;
            display: none;
            animation: bounce 1s infinite;
        }

        @keyframes bounce { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -10px); } }
    </style>
</head>
<body>

    <div id="menu-screen" class="full-overlay">
        <div class="menu-card">
            <button onclick="onNewGame()" class="menu-btn">New Game</button>
            <button onclick="showMessage('Save disabled in Demo')" class="menu-btn">Load Game</button>
            <button onclick="showMessage('Graphics: Ultra')" class="menu-btn">Options</button>
        </div>
    </div>

    <div id="intro-overlay" class="full-overlay">
        <video id="intro-video" preload="auto">
            <source src="https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-start-screen-grok.mp4" type="video/mp4">
        </video>
    </div>

    <div id="game-ui" class="hidden">
        <div id="zone-display" class="text-3xl text-cyan-400">The Wilds</div>
        <div id="stats" class="text-xl">Gold: <span id="gold-val">0</span> | Potions: <span id="pot-val">0</span></div>
        <div class="text-sm opacity-80">WASD: Move | Space: Jump | Enter / J: Shoot | E: Interact</div>
    </div>

    <div id="shop-ui">
        <h2 class="text-2xl text-yellow-400 mb-4 text-center">Town Shop</h2>
        <div class="shop-item">
            <span>Health Potion</span>
            <button class="buy-btn" onclick="buyItem('potion', 10)">10 Gold</button>
        </div>
        <div class="shop-item">
            <span>Speed Boots</span>
            <button class="buy-btn" onclick="buyItem('boots', 50)">50 Gold</button>
        </div>
        <button class="mt-4 w-full text-red-400" onclick="closeShop()">Close</button>
    </div>

    <div id="interaction-prompt">Press 'E' to Talk</div>

    <script>
        // --- STATE ---
        let scene, camera, renderer, clock;
        let player, enemies = [], platforms = [], npcs = [], projectiles = [];
        let keys = {};
        let gameActive = false;
        let stats = { gold: 0, potions: 0, speedMult: 1 };
        
        const textureLoader = new THREE.TextureLoader();
        const worldSize = 2000;
        const townCenter = 300; 
        const townRadius = 50;
        
        // Cache to store globally accessible fallback-ready materials
        let MATERIALS = {}; 

        const SPRITES = {
            player: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/25.png',
            enemy: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/129.png',
            npc: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/151.png',
            shopkeeper: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/122.png',
            grass: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/1.png',
            brick: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/11.png',
            bullet: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/items/poke-ball.png'
        };

        const GRAVITY = -0.015;
        const JUMP_FORCE = 0.32;

        function createSolidTexture(color) {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = color; ctx.fillRect(0,0,16,16);
            const tex = new THREE.CanvasTexture(canvas);
            tex.magFilter = THREE.NearestFilter;
            return tex;
        }

        // New highly robust material factory: Applies solid color instantly to prevent invisiblility
        function createSafeMaterial(url, fallbackColor) {
            const mat = new THREE.SpriteMaterial({ map: createSolidTexture(fallbackColor) });
            textureLoader.load(
                url, 
                (t) => { 
                    t.magFilter = THREE.NearestFilter; 
                    mat.map = t; 
                    mat.needsUpdate = true; 
                },
                undefined, 
                (err) => { 
                    console.warn(`Failed to load ${url}, keeping fallback solid texture.`); 
                }
            );
            return mat;
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);

            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.OrthographicCamera(-8*aspect, 8*aspect, 8, -8, 0.1, 1000);
            camera.position.set(0, 5, 10);

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            clock = new THREE.Clock();

            // Pre-compile our resilient materials
            MATERIALS = {
                player: createSafeMaterial(SPRITES.player, '#ffff00'),
                enemy: createSafeMaterial(SPRITES.enemy, '#ff0000'),
                npc: createSafeMaterial(SPRITES.npc, '#ffffff'),
                shopkeeper: createSafeMaterial(SPRITES.shopkeeper, '#ff00ff'),
                grass: createSafeMaterial(SPRITES.grass, '#2d5a27'),
                brick: createSafeMaterial(SPRITES.brick, '#8b4513'),
                bullet: createSafeMaterial(SPRITES.bullet, '#ffffff')
            };

            buildWorld();
            createPlayer();

            window.addEventListener('keydown', e => { 
                keys[e.code] = true;
                if(e.code === 'KeyE') handleInteraction();
                // Check for shoot keys (Enter or J)
                if(e.code === 'Enter' || e.code === 'KeyJ') shoot();
            });
            window.addEventListener('keyup', e => keys[e.code] = false);
            // Removed mousedown listener for shooting
            window.addEventListener('resize', onResize);

            animate();
        }

        function createPlayer() {
            player = new THREE.Sprite(MATERIALS.player);
            player.scale.set(1.5, 1.5, 1);
            player.position.set(0, 5, 2);
            player.userData = { vy: 0, onGround: false };
            scene.add(player);
        }

        function buildWorld() {
            // Generate Floor
            for(let x = -50; x < 500; x += 2) {
                const tile = new THREE.Sprite(MATERIALS.grass);
                tile.scale.set(2, 2, 1);
                tile.position.set(x, 0, 1);
                scene.add(tile);
            }
            platforms.push({ x: 225, y: 0, w: 1100, h: 2 });

            // Town Setup (X=300)
            const shopkeeper = new THREE.Sprite(MATERIALS.shopkeeper);
            shopkeeper.position.set(townCenter, 2, 1.5);
            shopkeeper.scale.set(1.6, 1.6, 1);
            shopkeeper.userData = { type: 'shop', name: 'Merchant' };
            scene.add(shopkeeper);
            npcs.push(shopkeeper);

            const villager = new THREE.Sprite(MATERIALS.npc);
            villager.position.set(townCenter - 15, 2, 1.5);
            villager.scale.set(1.5, 1.5, 1);
            villager.userData = { type: 'npc', name: 'Mayor', msg: 'Welcome to SpriteVille! Avoid the Magikarps East of here.' };
            scene.add(villager);
            npcs.push(villager);

            // Platforms & Enemies
            for(let i=0; i<150; i++) {
                const x = (Math.random() * 1000) - 100;
                // Don't spawn dangers in town
                if(Math.abs(x - townCenter) < townRadius) continue;

                const y = 3 + Math.random() * 7;
                const p = new THREE.Sprite(MATERIALS.brick);
                p.scale.set(3, 0.8, 1);
                p.position.set(x, y, 1);
                scene.add(p);
                platforms.push({ x: x, y: y, w: 3, h: 0.8 });

                if(Math.random() > 0.6) spawnEnemy(x, y + 1.1);
            }
        }

        function spawnEnemy(x, y) {
            const enemy = new THREE.Sprite(MATERIALS.enemy);
            enemy.position.set(x, y, 2);
            enemy.scale.set(1.2, 1.2, 1);
            enemy.userData = { startX: x, range: 4, dir: 1 };
            enemies.push(enemy);
            scene.add(enemy);
        }

        function handleInteraction() {
            npcs.forEach(npc => {
                if(player.position.distanceTo(npc.position) < 2.5) {
                    if(npc.userData.type === 'shop') {
                        document.getElementById('shop-ui').style.display = 'block';
                    } else {
                        showMessage(npc.userData.msg);
                    }
                }
            });
        }

        function buyItem(id, price) {
            if(stats.gold >= price) {
                stats.gold -= price;
                if(id === 'potion') stats.potions++;
                if(id === 'boots') {
                    stats.speedMult = 1.5;
                    showMessage("Speed Increased!");
                }
                updateUI();
            } else {
                showMessage("Not enough gold!");
            }
        }

        function updateUI() {
            document.getElementById('gold-val').innerText = stats.gold;
            document.getElementById('pot-val').innerText = stats.potions;
            
            const dist = Math.abs(player.position.x - townCenter);
            document.getElementById('zone-display').innerText = dist < townRadius ? "SpriteVille" : "The Wilds";
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!gameActive) return;

            // Movement
            const speed = 0.15 * stats.speedMult;
            if(keys['KeyA'] || keys['ArrowLeft']) { player.position.x -= speed; player.scale.x = -1.5; }
            if(keys['KeyD'] || keys['ArrowRight']) { player.position.x += speed; player.scale.x = 1.5; }

            player.userData.vy += GRAVITY;
            player.position.y += player.userData.vy;

            // Collision
            player.userData.onGround = false;
            platforms.forEach(p => {
                if(Math.abs(player.position.x - p.x) < (p.w/2 + 0.4)) {
                    const top = p.y + p.h/2;
                    if(player.position.y - 0.75 <= top && player.position.y > p.y && player.userData.vy <= 0) {
                        player.position.y = top + 0.75;
                        player.userData.vy = 0;
                        player.userData.onGround = true;
                    }
                }
            });

            if(keys['Space'] && player.userData.onGround) player.userData.vy = JUMP_FORCE;

            // Camera & UI
            camera.position.x += (player.position.x - camera.position.x) * 0.1;
            updateUI();

            // Interaction Check
            let near = false;
            npcs.forEach(npc => { if(player.position.distanceTo(npc.position) < 2.5) near = true; });
            document.getElementById('interaction-prompt').style.display = near ? 'block' : 'none';

            // Enemies
            enemies.forEach(en => {
                en.position.x += 0.04 * en.userData.dir;
                if(Math.abs(en.position.x - en.userData.startX) > en.userData.range) en.userData.dir *= -1;
                if(player.position.distanceTo(en.position) < 0.9) {
                    if(stats.potions > 0) {
                        stats.potions--;
                        player.position.y += 2; // Bounce back
                        showMessage("Used Potion!");
                    } else {
                        gameOver();
                    }
                }
            });

            // Projectiles logic fixed to safely iterate backward while deleting array elements
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.position.x += p.userData.vx;
                let hit = false;
                
                for (let ei = enemies.length - 1; ei >= 0; ei--) {
                    let en = enemies[ei];
                    if (p.position.distanceTo(en.position) < 1) {
                        scene.remove(en); 
                        enemies.splice(ei, 1);
                        scene.remove(p); 
                        projectiles.splice(i, 1);
                        stats.gold += 5;
                        hit = true;
                        break;
                    }
                }
                
                // Cleanup out-of-bounds bullets to prevent memory leak
                if (!hit && Math.abs(p.position.x - player.position.x) > 15) {
                    scene.remove(p);
                    projectiles.splice(i, 1);
                }
            }

            if(player.position.y < -10) gameOver();
            renderer.render(scene, camera);
        }

        function shoot() {
            // Prevent shooting if UI overlays are open or game not active
            if(!gameActive || document.getElementById('shop-ui').style.display === 'block') return;

            const bullet = new THREE.Sprite(MATERIALS.bullet);
            bullet.position.copy(player.position);
            bullet.scale.set(0.6, 0.6, 1);
            bullet.userData = { vx: player.scale.x > 0 ? 0.4 : -0.4 };
            projectiles.push(bullet);
            scene.add(bullet);
        }

        function onNewGame() {
            document.getElementById('menu-screen').style.display = 'none';
            const introOverlay = document.getElementById('intro-overlay');
            const introVideo = document.getElementById('intro-video');
            introOverlay.style.display = 'flex';
            
            // Try playing the video. If the link is dead, skip directly to game.
            introVideo.play().catch(e => { closeIntro(); });
            introVideo.onended = () => { closeIntro(); };
        }

        function closeIntro() {
            const introVideo = document.getElementById('intro-video');
            introVideo.pause();
            document.getElementById('intro-overlay').style.display = 'none';
            startGame();
        }

        function startGame() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-ui').classList.remove('hidden');
            
            // Adding a tiny delay to activate game logic
            setTimeout(() => { gameActive = true; }, 100);
        }

        function closeShop() { document.getElementById('shop-ui').style.display = 'none'; }

        function gameOver() {
            gameActive = false;
            alert("Captured by Magikarp! Gold lost: " + stats.gold);
            location.reload();
        }

        function showMessage(msg) {
            const b = document.createElement('div');
            b.style = "position:fixed; bottom:200px; left:50%; transform:translateX(-50%); background:yellow; padding:10px; border-radius:10px; z-index:1000;";
            b.innerText = msg;
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 3000);
        }

        function onResize() {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -8*aspect; camera.right = 8*aspect;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
</html>
