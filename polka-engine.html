<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Peyote - Pub Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Luckiest Guy', cursive; }
        canvas { display: block; }
        
        .full-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
        }

        #menu-screen {
            background: url('https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-start-screen.png');
            background-color: #1e3a8a;
            background-size: cover;
            background-position: center;
            z-index: 300;
            pointer-events: auto;
            justify-content: flex-end;
            padding-bottom: 8vh;
        }

        .menu-card {
            background: rgba(0, 0, 0, 0.7);
            padding: 1rem 2rem;
            border-radius: 50px;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: row;
            gap: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .menu-btn {
            padding: 0.5rem 1.5rem;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.5rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s;
            text-shadow: 2px 2px 0px #000;
        }

        .menu-btn:hover { transform: scale(1.1); color: #22d3ee; }

        #game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
            display: flex;
            flex-direction: column; gap: 5px;
        }

        /* Shop & Pub UI */
        .interaction-ui {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 10, 5, 0.95);
            border: 4px solid #facc15;
            padding: 2rem;
            border-radius: 20px;
            color: white;
            display: none;
            z-index: 500;
            pointer-events: auto;
            min-width: 320px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #443322;
        }

        .buy-btn {
            background: #16a34a;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-family: sans-serif;
            font-weight: bold;
        }

        #transition-overlay {
            position: fixed;
            inset: 0;
            background: black;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            z-index: 1000;
        }

        #interaction-prompt {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            padding: 5px 15px;
            border-radius: 20px;
            display: none;
            z-index: 200;
        }
    </style>
</head>
<body onclick="tryStartMenuMusic()">

    <audio id="menu-music" loop>
        <source src="https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-theme.mp3" type="audio/mpeg">
    </audio>
    <audio id="game-music" loop>
        <source src="https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/Whispers_of_the_Verdant_Keep.mp3" type="audio/mpeg">
    </audio>

    <div id="transition-overlay"></div>

    <div id="menu-screen" class="full-overlay">
        <div class="menu-card">
            <button onclick="onNewGame()" class="menu-btn">New Game</button>
            <button onclick="openOptions()" class="menu-btn">Options</button>
        </div>
    </div>

    <div id="game-ui" class="hidden">
        <div id="zone-display" class="text-3xl text-cyan-400">SpriteVille</div>
        <div id="stats" class="text-xl">Gold: <span id="gold-val">0</span> | Beers: <span id="beer-val">0</span></div>
        <div class="text-sm opacity-80">WASD: Move | Space: Jump | E: Interact / Enter Pub</div>
    </div>

    <!-- Generic Shop/Pub UI -->
    <div id="shop-ui" class="interaction-ui">
        <h2 id="shop-title" class="text-3xl text-yellow-500 mb-4 text-center">Town Shop</h2>
        <div id="shop-items-container"></div>
        <button class="mt-6 w-full py-2 bg-red-700 rounded-lg" onclick="closeInteractionUI()">Exit</button>
    </div>

    <div id="interaction-prompt">Press 'E'</div>

    <script>
        // --- AUDIO ---
        let audioCtx;
        let globalMusicVol = 0.4;
        let musicEnabled = true;
        let sfxEnabled = true;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function tryStartMenuMusic() {
            initAudio();
            const m = document.getElementById('menu-music');
            if (musicEnabled && m.paused && !gameActive) { m.volume = globalMusicVol; m.play().catch(()=>{}); }
        }

        const sfx = {
            collect: () => playSfx(800, 'sine', 0.2, 0.1),
            door: () => playSfx(120, 'square', 0.3, 0.15)
        };

        function playSfx(freq, type, duration, vol) {
            if (!audioCtx || !sfxEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        // --- GAME ENGINE ---
        let scene, camera, renderer, clock;
        let player, platforms = [], npcs = [], items = [];
        let keys = {};
        let gameActive = false, isPaused = false;
        let currentZone = 'town'; // 'town' or 'pub'
        let stats = { gold: 100, beers: 0 };
        const VIEW_SIZE = 4.5;
        const textureLoader = new THREE.TextureLoader();

        let MATERIALS = {};
        let pubBuilding = null;

        const SPRITES = {
            stand: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-standing-sprite-sheet-2x1-140Px140P.png',
            runR: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-run-cycle-right-12fps.png',
            runL: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-run-cycle-left-12fps.png',
            pub: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/pub850x700.png',
            pubOpen: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/pub-door-open-850x700.png',
            barkeeper: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/other/official-artwork/113.png',
            pubBg: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-start-screen.png' // Mock interior
        };

        function createMat(url, tx=1, ty=1) {
            const m = new THREE.SpriteMaterial({ map: textureLoader.load(url, t => {
                t.magFilter = THREE.NearestFilter;
                t.repeat.set(1/tx, 1/ty);
            })});
            return m;
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.OrthographicCamera(-VIEW_SIZE * aspect, VIEW_SIZE * aspect, VIEW_SIZE, -VIEW_SIZE, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            clock = new THREE.Clock();

            MATERIALS = {
                stand: createMat(SPRITES.stand, 2, 1),
                runR: createMat(SPRITES.runR, 11, 1),
                runL: createMat(SPRITES.runL, 11, 1),
                pub: createMat(SPRITES.pub),
                pubOpen: createMat(SPRITES.pubOpen),
                barkeeper: createMat(SPRITES.barkeeper),
                grass: createMat('https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/1.png')
            };

            loadTown();
            createPlayer();

            window.onkeydown = e => { 
                keys[e.code] = true; 
                if(e.code === 'KeyE') handleInteraction();
            };
            window.onkeyup = e => keys[e.code] = false;
            animate();
        }

        function createPlayer() {
            player = new THREE.Sprite(MATERIALS.stand);
            player.scale.set(2, 2, 1);
            player.position.set(0, 5, 2);
            player.userData = { vy: 0, animFrame: 0, animTimer: 0, facingR: true };
            scene.add(player);
        }

        function clearScene() {
            platforms.forEach(p => scene.remove(p));
            npcs.forEach(n => scene.remove(n));
            if(pubBuilding) scene.remove(pubBuilding);
            platforms = []; npcs = []; pubBuilding = null;
        }

        function loadTown() {
            clearScene();
            currentZone = 'town';
            scene.background = new THREE.Color(0x87CEEB);
            
            // Ground
            addPlatform(0, 0, 100, 2);
            for(let x=-20; x<20; x+=2) {
                const g = new THREE.Sprite(MATERIALS.grass);
                g.scale.set(2,2,1); g.position.set(x, 0, 1); scene.add(g);
            }

            // Pub
            pubBuilding = new THREE.Sprite(MATERIALS.pub);
            pubBuilding.scale.set(5, 4, 1);
            pubBuilding.position.set(-8, 3.2, 0.5);
            scene.add(pubBuilding);
            
            document.getElementById('zone-display').innerText = "SpriteVille";
        }

        function loadPubInterior() {
            clearScene();
            currentZone = 'pub';
            scene.background = new THREE.Color(0x221100);

            // Floor
            addPlatform(0, 0, 20, 2);
            
            // Barkeeper
            const bk = new THREE.Sprite(MATERIALS.barkeeper);
            bk.scale.set(2.5, 2.5, 1);
            bk.position.set(4, 2.5, 1);
            bk.userData = { type: 'barkeeper', name: 'The Barkeep' };
            npcs.push(bk);
            scene.add(bk);

            // Exit Marker
            const exit = new THREE.Sprite(createMat(SPRITES.pubOpen));
            exit.scale.set(3, 3.5, 1);
            exit.position.set(-7, 2.7, 0.1);
            exit.userData = { type: 'exit' };
            npcs.push(exit);
            scene.add(exit);

            document.getElementById('zone-display').innerText = "The Rusty Sprite Pub";
        }

        function addPlatform(x, y, w, h) {
            const p = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshBasicMaterial({color: 0x443322, visible: false}));
            p.position.set(x, y, 0);
            platforms.push(p);
            scene.add(p);
        }

        function handleInteraction() {
            if(isPaused) return;

            // Door check (Town -> Pub)
            if(currentZone === 'town' && pubBuilding) {
                const doorX = pubBuilding.position.x - 1.2;
                if(Math.abs(player.position.x - doorX) < 1.5) {
                    transitionZone('pub');
                    return;
                }
            }

            // NPC/Exit checks
            npcs.forEach(n => {
                if(player.position.distanceTo(n.position) < 2.5) {
                    if(n.userData.type === 'barkeeper') openPubMenu();
                    if(n.userData.type === 'exit') transitionZone('town');
                }
            });
        }

        function transitionZone(target) {
            const ov = document.getElementById('transition-overlay');
            ov.style.opacity = 1;
            sfx.door();
            setTimeout(() => {
                if(target === 'pub') {
                    loadPubInterior();
                    player.position.set(-6, 5, 2);
                } else {
                    loadTown();
                    player.position.set(-9.2, 5, 2);
                }
                ov.style.opacity = 0;
            }, 500);
        }

        function openPubMenu() {
            isPaused = true;
            const ui = document.getElementById('shop-ui');
            const container = document.getElementById('shop-items-container');
            document.getElementById('shop-title').innerText = "Pub Menu";
            ui.style.display = 'block';
            
            container.innerHTML = `
                <div class="shop-item">
                    <div>
                        <p class="text-xl">Frosty Ale</p>
                        <p class="text-xs text-gray-400">Restores spirits.</p>
                    </div>
                    <button class="buy-btn" onclick="buyBeer(5)">5 Gold</button>
                </div>
                <div class="shop-item">
                    <div>
                        <p class="text-xl">Cactus Juice</p>
                        <p class="text-xs text-gray-400">Gets you through the desert.</p>
                    </div>
                    <button class="buy-btn" onclick="buyBeer(15)">15 Gold</button>
                </div>
            `;
        }

        function buyBeer(price) {
            if(stats.gold >= price) {
                stats.gold -= price;
                stats.beers++;
                sfx.collect();
                updateUI();
                showMessage("Bought a drink!");
            } else {
                showMessage("Need more gold, friend!");
            }
        }

        function closeInteractionUI() {
            document.getElementById('shop-ui').style.display = 'none';
            isPaused = false;
        }

        function showMessage(m) {
            const d = document.createElement('div');
            d.className = "fixed top-1/2 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-2 rounded-full z-[2000]";
            d.innerText = m;
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 2000);
        }

        function updateUI() {
            document.getElementById('gold-val').innerText = stats.gold;
            document.getElementById('beer-val').innerText = stats.beers;
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!gameActive || isPaused) {
                renderer.render(scene, camera);
                return;
            }

            // Movement
            let moving = false;
            const spd = 0.12;
            if(keys['KeyA']) { player.position.x -= spd; player.userData.facingR = false; moving = true; }
            if(keys['KeyD']) { player.position.x += spd; player.userData.facingR = true; moving = true; }

            // Pub Door Visual Logic
            if(currentZone === 'town' && pubBuilding) {
                const doorX = pubBuilding.position.x - 1.2;
                if(Math.abs(player.position.x - doorX) < 1.5) pubBuilding.material = MATERIALS.pubOpen;
                else pubBuilding.material = MATERIALS.pub;
            }

            // Animation
            let anim = moving ? (player.userData.facingR ? 'runR' : 'runL') : 'stand';
            player.material = MATERIALS[anim === 'stand' ? 'stand' : anim];
            if(anim !== 'stand') {
                if(++player.userData.animTimer > 6) { player.userData.animFrame = (player.userData.animFrame + 1) % 11; player.userData.animTimer = 0; }
                player.material.map.offset.x = player.userData.animFrame / 11;
            } else {
                player.material.map.offset.x = player.userData.facingR ? 0.5 : 0;
            }

            // Physics
            player.userData.vy -= 0.015;
            player.position.y += player.userData.vy;
            platforms.forEach(p => {
                if(Math.abs(player.position.x - p.position.x) < 10) { // Simple floor check
                    if(player.position.y < 2.1 && player.userData.vy <= 0) {
                        player.position.y = 2.1;
                        player.userData.vy = 0;
                        if(keys['Space']) player.userData.vy = 0.3;
                    }
                }
            });

            // Interaction Prompt
            let near = false;
            if(currentZone === 'town' && Math.abs(player.position.x - (pubBuilding.position.x - 1.2)) < 1.5) near = true;
            npcs.forEach(n => { if(player.position.distanceTo(n.position) < 2.5) near = true; });
            document.getElementById('interaction-prompt').style.display = near ? 'block' : 'none';

            camera.position.x += (player.position.x - camera.position.x) * 0.1;
            renderer.render(scene, camera);
        }

        function onNewGame() {
            gameActive = true;
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-ui').classList.remove('hidden');
            const g = document.getElementById('game-music');
            g.volume = globalMusicVol; g.play();
            document.getElementById('menu-music').pause();
            updateUI();
        }

        function openOptions() { alert("Volume controls etc."); }

        window.onload = init;
    </script>
</body>
</html>
