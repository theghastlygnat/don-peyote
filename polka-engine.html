<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Sprite Open World - Scaled Pub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Luckiest Guy', cursive; 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }
        
        #game-viewport {
            position: relative;
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        canvas { 
            display: block; 
            width: 100% !important;
            height: 100% !important;
        }
        
        .full-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
        }

        #menu-screen {
            background: url('https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-start-screen.png');
            background-color: #1e3a8a;
            background-size: cover;
            background-position: center;
            z-index: 300;
            pointer-events: auto;
            justify-content: flex-end;
            padding-bottom: 8%;
        }

        .menu-card {
            background: rgba(0, 0, 0, 0.7);
            padding: 1rem 2rem;
            border-radius: 50px;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: row;
            gap: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            align-items: center;
        }

        .menu-btn {
            padding: 0.5rem 1.5rem;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.5rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s;
            text-shadow: 2px 2px 0px #000;
        }

        .menu-btn:hover { transform: scale(1.1); color: #22d3ee; }

        #options-overlay {
            background: rgba(0,0,0,0.85);
            z-index: 500;
            display: none;
            pointer-events: auto;
        }

        .options-panel {
            background: #1e293b;
            padding: 2rem;
            border-radius: 30px;
            border: 4px solid #22d3ee;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-width: 320px;
            max-height: 90%;
            overflow-y: auto;
        }

        #game-ui {
            position: absolute;
            top: 4%;
            left: 4%;
            color: white;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
            display: flex;
            flex-direction: column; 
            gap: 5px;
            z-index: 200;
        }

        #shop-ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 4px solid #facc15;
            padding: 2rem;
            border-radius: 20px;
            color: white;
            display: none;
            z-index: 500;
            pointer-events: auto;
            width: 80%;
            max-width: 400px;
        }

        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #333;
        }

        .buy-btn {
            background: #16a34a;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        #intro-overlay {
            background: black;
            z-index: 400;
            display: none;
            pointer-events: auto;
        }
        
        #intro-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #fade-overlay {
            position: absolute;
            inset: 0;
            background: black;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            z-index: 1000;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            background: #334155;
            outline: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #22d3ee;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body onclick="tryStartMenuMusic()">

    <audio id="menu-music" loop>
        <source src="https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-theme.mp3" type="audio/mpeg">
    </audio>
    <audio id="game-music" loop>
        <source src="https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/Whispers_of_the_Verdant_Keep.mp3" type="audio/mpeg">
    </audio>

    <div id="game-viewport">
        <div id="fade-overlay"></div>

        <!-- Main Menu -->
        <div id="menu-screen" class="full-overlay">
            <div class="menu-card">
                <button onclick="onNewGame()" class="menu-btn">New Game</button>
                <button onclick="showMessage('Save system coming soon!')" class="menu-btn">Load Game</button>
                <button onclick="openOptions()" class="menu-btn">Options</button>
            </div>
        </div>

        <!-- Options Menu -->
        <div id="options-overlay" class="full-overlay">
            <div class="options-panel">
                <h2 class="text-3xl text-cyan-400 text-center mb-2">Settings</h2>
                
                <button onclick="toggleMusic()" id="music-btn" class="menu-btn bg-cyan-900/50 rounded-lg text-lg py-2">Music: ON</button>
                
                <div class="flex flex-col gap-1 px-4">
                    <label class="text-white text-sm flex justify-between">
                        <span>Music Volume</span>
                        <span id="vol-label">40%</span>
                    </label>
                    <input type="range" min="0" max="100" value="40" class="volume-slider" id="music-vol" oninput="updateVolume(this.value)">
                </div>

                <button onclick="toggleSfx()" id="sfx-btn" class="menu-btn bg-cyan-900/50 rounded-lg text-lg py-2">Sounds: ON</button>

                <div class="mt-4 pt-4 border-t border-cyan-800/50 flex flex-col gap-2">
                    <h3 class="text-xl text-yellow-400 text-center mb-1">Advanced</h3>
                    
                    <input type="file" id="map-upload" accept=".json" style="display: none;" onchange="handleMapUpload(event)">
                    <button onclick="document.getElementById('map-upload').click()" class="w-full py-2 bg-purple-900/30 border border-purple-500/50 rounded-lg text-white text-lg hover:bg-purple-800/50 transition-colors">
                        Import Custom Map (.json)
                    </button>

                    <button onclick="toggleWireframe()" id="wireframe-btn" class="w-full py-2 bg-yellow-900/30 border border-yellow-500/50 rounded-lg text-white text-lg">Wireframe Mode: OFF</button>
                </div>

                <button onclick="closeOptions()" class="mt-4 p-3 bg-red-600/80 hover:bg-red-600 text-white rounded-xl transition-colors">Close</button>
            </div>
        </div>

        <div id="intro-overlay" class="full-overlay">
            <video id="intro-video" preload="auto">
                <source src="https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-start-screen-grok.mp4" type="video/mp4">
            </video>
        </div>

        <div id="game-ui" class="hidden">
            <div id="zone-display" class="text-3xl text-cyan-400">SpriteVille</div>
            <div id="stats" class="text-xl">Gold: <span id="gold-val">0</span> | Potions: <span id="pot-val">0</span></div>
            <div class="text-sm opacity-80">WASD: Move | Space: Jump | Enter: Shoot | E: Interact</div>
        </div>

        <div id="shop-ui">
            <h2 class="text-2xl text-yellow-400 mb-4 text-center">Town Shop</h2>
            <div class="shop-item"><span>Health Potion</span><button class="buy-btn" onclick="buyItem('potion', 10)">10 Gold</button></div>
            <div class="shop-item"><span>Speed Boots</span><button class="buy-btn" onclick="buyItem('boots', 50)">50 Gold</button></div>
            <button class="mt-4 w-full text-red-400" onclick="closeShop()">Close</button>
        </div>
    </div>

    <script>
        // --- CONSTANTS ---
        const TARGET_ASPECT = 16 / 9;
        const VIEW_SIZE = 4.2;
        const GRAVITY = -0.015;
        const JUMP_FORCE = 0.32;
        const BIOME_RANGE = 50; 
        
        const DEFAULT_LEVEL_JSON = `
        {
            "world": {
                "id": "world",
                "grassTiles": { "startX": -400, "endX": 1000, "step": 2, "y": 0, "z": 0.4 },
                "platforms": [
                    { "x": 300, "y": -0.62, "w": 2000, "h": 2 },
                    { "x": -15, "y": 3, "w": 3, "h": 0.8 },
                    { "x": -25, "y": 4.5, "w": 3, "h": 0.8 },
                    { "x": 15, "y": 3, "w": 3, "h": 0.8 }
                ],
                "buildings": [
                    { "id": "pub", "type": "pub", "x": -25, "y": 3.88, "z": 0.5, "w": 8.5, "h": 7.0 }
                ],
                "npcs": [
                    { "type": "shopkeeper", "x": 5, "y": 0.8, "config": { "type": "shop", "name": "Merchant", "wanderRange": 3 } },
                    { "type": "mayor", "x": -8, "y": 0.8, "config": { "type": "npc", "name": "Mayor", "msg": "Welcome to SpriteVille! I am the Mayor.", "wanderRange": 5 } }
                ],
                "enemies": [
                    { "x": -15, "y": 4.1 },
                    { "x": -25, "y": 5.6 }
                ],
                "generators": [
                    { "type": "platform_and_enemy", "count": 82, "minX": -400, "maxX": -40, "minY": 3, "maxY": 10, "enemyChance": 0.4 },
                    { "type": "platform_and_enemy", "count": 218, "minX": 40, "maxX": 1000, "minY": 3, "maxY": 10, "enemyChance": 0.4 }
                ]
            },
            "pubLevel": {
                "id": "pubLevel",
                "platforms": [
                    { "x": 0, "y": 0, "w": 16, "h": 2 },
                    { "x": -7.5, "y": 4, "w": 1, "h": 8 },
                    { "x": 7.5, "y": 4, "w": 1, "h": 8 },
                    { "x": 0, "y": 8, "w": 16, "h": 1 }
                ],
                "npcs": [
                    { "type": "barkeeper", "x": 4, "y": 1.5, "config": { "type": "npc", "name": "Joe", "msg": "The usual, Don?", "wanderRange": 2 } }
                ],
                "props": [
                    { "type": "pubBg", "x": 0, "y": 4, "z": -0.5, "w": 16, "h": 8 }
                ]
            }
        }`;

        let currentLevelData = JSON.parse(DEFAULT_LEVEL_JSON);

        // --- AUDIO ENGINE ---
        let audioCtx;
        let menuMusicStarted = false, gameMusicStarted = false;
        let globalMusicVol = 0.4, musicEnabled = true, sfxEnabled = true;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function updateVolume(v) { globalMusicVol = v/100; document.getElementById('vol-label').innerText = v + "%"; const m = document.getElementById('menu-music'), g = document.getElementById('game-music'); m.volume = globalMusicVol; g.volume = globalMusicVol; }
        function tryStartMenuMusic() { initAudio(); if (musicEnabled && !menuMusicStarted && !gameActive) { const m = document.getElementById('menu-music'); m.volume = globalMusicVol; m.play().then(() => menuMusicStarted = true).catch(() => {}); } }
        function switchMusicToGame() { document.getElementById('menu-music').pause(); menuMusicStarted = false; if (musicEnabled) { const g = document.getElementById('game-music'); g.volume = globalMusicVol; g.play().then(() => gameMusicStarted = true).catch(() => {}); } }
        function playSound(f, t, d, v) { if (!audioCtx || !sfxEnabled) return; const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime); g.gain.setValueAtTime(v, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d); }
        const sfx = { jump: () => playSound(400, 'square', 0.1, 0.1), shoot: () => playSound(150, 'sawtooth', 0.1, 0.05), collect: () => playSound(800, 'sine', 0.2, 0.1), door: () => playSound(200, 'triangle', 0.4, 0.1), damage: () => playSound(100, 'sawtooth', 0.3, 0.2) };

        // --- GAME ENGINE ---
        let scene, camera, renderer, clock;
        let player, interactSprite, bgLayers = {}, enemies = [], platforms = [], npcs = [], projectiles = [];
        let keys = {};
        let gameActive = false, isPaused = false, wireframeMode = false;
        let inPubLevel = false; 
        let stats = { gold: 0, potions: 0, speedMult: 1 };
        
        const textureLoader = new THREE.TextureLoader();
        let backgroundGroup, worldGroup, pubLevelGroup; 
        let pubBuilding = null;
        let MATERIALS = {};

        const SPRITES = {
            playerStand: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-standing-sprite-sheet-2x1-140Px140P.png',
            playerRunLeft: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-run-cycle-left-12fps.png',
            playerRunRight: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-run-cycle-right-12fps.png',
            enemy: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/129.png',
            npc: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/151.png',
            mayor: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/mayor-500x500.png',
            shopkeeper: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/122.png',
            grass: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/grass-tilesheet-944x267-gemini.png',
            brick: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/brick185x185-gemini.png',
            bullet: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/items/poke-ball.png',
            pub: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/pub850x700.png',
            pubOpen: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/pub-door-open-850x700.png',
            pubBg: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/pub-bg.png',
            barkeeper: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/113.png',
            bgTown: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/village-bg.png',
            bgForestLeft: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/forestbg-3-gemini.png',
            bgForestRight: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/forestbg-3-gemini.png'
        };

        function createSolidTexture(color) {
            const c = document.createElement('canvas'); c.width = 16; c.height = 16;
            const ctx = c.getContext('2d'); ctx.fillStyle = color; ctx.fillRect(0,0,16,16);
            const tex = new THREE.CanvasTexture(c); tex.magFilter = THREE.NearestFilter; return tex;
        }

        function createExclamationTexture() {
            const c = document.createElement('canvas'); c.width = 64; c.height = 64;
            const ctx = c.getContext('2d');
            ctx.fillStyle = '#facc15'; ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(32, 32, 28, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#000'; ctx.fillRect(28, 12, 8, 24); ctx.fillRect(28, 42, 8, 8);
            const tex = new THREE.CanvasTexture(c); tex.magFilter = THREE.NearestFilter; return tex;
        }

        function createSafeMaterial(url, fallback, tilesX = 1, tilesY = 1) {
            const mat = new THREE.SpriteMaterial({ map: createSolidTexture(fallback), transparent: true });
            textureLoader.load(url, (t) => { 
                t.magFilter = THREE.NearestFilter; 
                if (tilesX > 1 || tilesY > 1) t.repeat.set(1 / tilesX, 1 / tilesY);
                mat.map = t; mat.needsUpdate = true; 
            });
            return mat;
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            
            camera = new THREE.OrthographicCamera(-VIEW_SIZE * TARGET_ASPECT, VIEW_SIZE * TARGET_ASPECT, VIEW_SIZE, -VIEW_SIZE, 0.1, 1000);
            camera.position.set(0, 5, 20);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            document.getElementById('game-viewport').appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 1.2));

            MATERIALS = {
                playerStand: createSafeMaterial(SPRITES.playerStand, '#ffff00', 2, 1),
                playerRunLeft: createSafeMaterial(SPRITES.playerRunLeft, '#ffff00', 11, 1),
                playerRunRight: createSafeMaterial(SPRITES.playerRunRight, '#ffff00', 11, 1),
                enemy: createSafeMaterial(SPRITES.enemy, '#ff0000'),
                npc: createSafeMaterial(SPRITES.npc, '#ffffff'),
                mayor: createSafeMaterial(SPRITES.mayor, '#ffffff'),
                shopkeeper: createSafeMaterial(SPRITES.shopkeeper, '#ff00ff'),
                brickBase: null,
                bullet: createSafeMaterial(SPRITES.bullet, '#ffffff'),
                pub: createSafeMaterial(SPRITES.pub, '#444444'),
                pubOpen: createSafeMaterial(SPRITES.pubOpen, '#444444'),
                pubBg: createSafeMaterial(SPRITES.pubBg, '#222222'),
                barkeeper: createSafeMaterial(SPRITES.barkeeper, '#ffaaaa'),
                exclamation: new THREE.SpriteMaterial({ map: createExclamationTexture(), transparent: true })
            };

            textureLoader.load(SPRITES.brick, (t) => {
                t.magFilter = THREE.NearestFilter;
                t.wrapS = THREE.RepeatWrapping;
                t.wrapT = THREE.RepeatWrapping;
                MATERIALS.brickBase = t;
            });

            MATERIALS.grassFrames = [];
            for(let i = 0; i < 4; i++) MATERIALS.grassFrames.push(new THREE.SpriteMaterial({ map: createSolidTexture('#2d5a27'), transparent: true }));
            textureLoader.load(SPRITES.grass, (t) => {
                for(let i = 0; i < 4; i++) {
                    const tex = t.clone(); tex.magFilter = THREE.NearestFilter;
                    tex.repeat.set(0.25, 1); tex.offset.x = i / 4; tex.needsUpdate = true;
                    MATERIALS.grassFrames[i].map = tex; MATERIALS.grassFrames[i].needsUpdate = true;
                }
            });

            backgroundGroup = new THREE.Group();
            worldGroup = new THREE.Group();
            pubLevelGroup = new THREE.Group();
            pubLevelGroup.visible = false;
            
            scene.add(backgroundGroup);
            scene.add(worldGroup);
            scene.add(pubLevelGroup);

            buildBiomeBackgrounds();
            loadLevelData('world', worldGroup, currentLevelData);
            loadLevelData('pubLevel', pubLevelGroup, currentLevelData);
            createPlayer();

            window.addEventListener('keydown', e => { 
                keys[e.code] = true;
                if(e.code === 'KeyE') handleInteraction();
                if(e.code === 'Enter' || e.code === 'KeyJ') shoot();
                if(e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') jump();
                if(e.code === 'Escape') toggleOptionsFromKey();
                tryStartMenuMusic();
            });
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('resize', onResize);
            
            onResize(); 
            animate();
        }

        function jump() {
            if(!gameActive || isPaused || player.userData.isRespawning) return;
            if(player.userData.onGround) {
                player.userData.vy = JUMP_FORCE;
                player.userData.onGround = false;
                sfx.jump();
            }
        }

        function handleMapUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsedData = JSON.parse(e.target.result);
                    currentLevelData = parsedData;
                    clearLevel();
                    loadLevelData('world', worldGroup, currentLevelData);
                    loadLevelData('pubLevel', pubLevelGroup, currentLevelData);
                    showMessage("Map Loaded!");
                    if(player) {
                        inPubLevel = false; worldGroup.visible = true; pubLevelGroup.visible = false;
                        player.position.set(0, 4, 2); player.userData.vy = 0;
                    }
                } catch (err) { showMessage("Invalid Map JSON!"); }
            };
            reader.readAsText(file);
            event.target.value = ''; 
        }

        function clearLevel() {
            while(worldGroup.children.length > 0) worldGroup.remove(worldGroup.children[0]);
            while(pubLevelGroup.children.length > 0) pubLevelGroup.remove(pubLevelGroup.children[0]);
            platforms.forEach(p => { if(p.helper && p.helper.parent) p.helper.parent.remove(p.helper); });
            platforms = [];
            npcs.forEach(n => { if(n.sprite.userData.helper && n.sprite.userData.helper.parent) n.sprite.userData.helper.parent.remove(n.sprite.userData.helper); });
            npcs = [];
            enemies.forEach(e => { if(e.userData.helper && e.userData.helper.parent) e.userData.helper.parent.remove(e.userData.helper); });
            enemies = [];
            pubBuilding = null;
        }

        function loadLevelData(levelId, group, mapData) {
            const data = mapData[levelId];
            if (!data) return;
            if (data.grassTiles) {
                const conf = data.grassTiles;
                for(let x = conf.startX; x < conf.endX; x += conf.step) {
                    let frame = 3; if (Math.random() < 0.15) frame = Math.floor(Math.random() * 3);
                    const tile = new THREE.Sprite(MATERIALS.grassFrames[frame]);
                    tile.position.set(x, conf.y, conf.z); tile.scale.set(2, 2, 1);
                    group.add(tile);
                }
            }
            if (data.platforms) data.platforms.forEach(p => addPlatform(p.x, p.y, p.w, p.h, group));
            if (data.buildings) {
                data.buildings.forEach(b => {
                    const mesh = new THREE.Sprite(MATERIALS[b.type]);
                    mesh.position.set(b.x, b.y, b.z); mesh.scale.set(b.w, b.h, 1);
                    group.add(mesh); if (b.id === 'pub') pubBuilding = mesh;
                });
            }
            if (data.props) {
                data.props.forEach(p => {
                    const mesh = new THREE.Sprite(MATERIALS[p.type]);
                    mesh.position.set(p.x, p.y, p.z || 0.5); mesh.scale.set(p.w || 1, p.h || 1, 1);
                    group.add(mesh);
                });
            }
            if (data.npcs) data.npcs.forEach(n => spawnNPC(n.x, n.y, n.type, n.config, group));
            if (data.enemies) data.enemies.forEach(e => spawnEnemy(e.x, e.y, group));
            if (data.generators) {
                data.generators.forEach(gen => {
                    if (gen.type === 'platform_and_enemy') {
                        for(let i=0; i<gen.count; i++) {
                            const x = (Math.random() * (gen.maxX - gen.minX)) + gen.minX;
                            const y = gen.minY + Math.random() * (gen.maxY - gen.minY);
                            addPlatform(x, y, 3, 0.8, group);
                            if(Math.random() < gen.enemyChance) spawnEnemy(x, y + 1.1, group);
                        }
                    }
                });
            }
        }

        function buildBiomeBackgrounds() {
            const h = 8.5; 
            const biomes = [{ id: 'town', url: SPRITES.bgTown, z: -5, offsetX: 0 }, { id: 'forestLeft', url: SPRITES.bgForestLeft, z: -5.1, offsetX: -120 }, { id: 'forestRight', url: SPRITES.bgForestRight, z: -5.1, offsetX: 120 }];
            biomes.forEach(biome => {
                textureLoader.load(biome.url, (tex) => {
                    const aspect = tex.image.width / tex.image.height;
                    const w = h * aspect;
                    const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: biome.id === 'town' ? 1 : 0 });
                    const geom = new THREE.PlaneGeometry(w, h);
                    const mesh = new THREE.Mesh(geom, mat);
                    const bottomY = 5 - VIEW_SIZE;
                    const centeredY = bottomY + (h * 0.7);
                    mesh.position.set(biome.offsetX, centeredY+5, biome.z);
                    mesh.userData = { w, h, startX: biome.offsetX, id: biome.id };
                    bgLayers[biome.id] = mesh; backgroundGroup.add(mesh);
                });
            });
        }

        function createPlayer() {
            player = new THREE.Sprite(MATERIALS.playerStand);
            player.scale.set(2.2, 2.2, 1); player.position.set(0, 0, 2);
            player.userData = { vy: 0, onGround: false, facingRight: true, currentAnim: 'stand', animFrame: 0, animTimer: 0, isRespawning: false, width: 0.7, height: 1.1 };
            player.userData.helper = createBoxHelperForHitbox(player, 0x22d3ee);
            scene.add(player);
            interactSprite = new THREE.Sprite(MATERIALS.exclamation);
            interactSprite.scale.set(0.6, 0.6, 1); interactSprite.visible = false;
            scene.add(interactSprite);
        }

        function createBoxHelperForHitbox(m, c) {
            const geom = new THREE.BoxGeometry(m.userData.width, m.userData.height, 0.2);
            const mat = new THREE.MeshBasicMaterial({ color: c, wireframe: true });
            const mesh = new THREE.Mesh(geom, mat);
            scene.add(mesh); mesh.visible = wireframeMode; return mesh;
        }

        function addPlatform(x, y, w, h, group) {
            const mat = new THREE.SpriteMaterial({ map: createSolidTexture('#8b4513'), transparent: true });
            const checkBase = setInterval(() => { if (MATERIALS.brickBase) { const tiledTex = MATERIALS.brickBase.clone(); tiledTex.repeat.set(w, h); tiledTex.needsUpdate = true; mat.map = tiledTex; mat.needsUpdate = true; clearInterval(checkBase); } }, 100);
            const p = new THREE.Sprite(mat); p.scale.set(w, h, 1); p.position.set(x, y, 1);
            if (w < 100) group.add(p);
            const helper = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.1), new THREE.MeshBasicMaterial({color: 0x00ff00, wireframe: true}));
            helper.position.set(x, y, 1.1); helper.visible = wireframeMode; group.add(helper);
            platforms.push({ x, y, w, h, helper, group });
        }

        function spawnNPC(x, y, matKey, data, group) {
            const npc = new THREE.Sprite(MATERIALS[matKey]);
            npc.position.set(x, y, 1.5); 
            const scale = matKey === 'mayor' ? 2.2 : 1.6;
            npc.scale.set(scale, scale, 1);
            npc.userData = { 
                ...data, 
                startX: x, 
                state: 'idle', 
                timer: Math.random() * 2000, 
                moveSpeed: 0.02 + Math.random() * 0.02,
                wanderRange: data.wanderRange || 5,
                dir: 1,
                helper: createBoxHelper(npc, 0xffffff) 
            };
            npcs.push({ sprite: npc, group }); group.add(npc);
        }

        function spawnEnemy(x, y, group) {
            const enemy = new THREE.Sprite(MATERIALS.enemy);
            enemy.position.set(x, y, 2); enemy.scale.set(1.2, 1.2, 1);
            enemy.userData = { startX: x, range: 4, dir: 1, helper: createBoxHelper(enemy, 0xff0000) };
            enemies.push(enemy); group.add(enemy);
        }

        function handleInteraction() {
            if(isPaused || player.userData.isRespawning) return;
            // Updated door offset to -2.0 for the larger pub
            if (!inPubLevel && pubBuilding && pubBuilding.parent === worldGroup) { 
                if (Math.abs(player.position.x - (pubBuilding.position.x - 2.0)) < 1.5) { transitionScene(true); return; } 
            }
            if (inPubLevel && Math.abs(player.position.x - (-6)) < 1.5) { transitionScene(false); return; }
            npcs.forEach(n => {
                if (n.group.visible && player.position.distanceTo(n.sprite.position) < 2.5) {
                    if(n.sprite.userData.type === 'shop') document.getElementById('shop-ui').style.display = 'block';
                    else showMessage(n.sprite.userData.msg);
                }
            });
        }

        function transitionScene(entering) {
            const fade = document.getElementById('fade-overlay'); fade.style.opacity = '1'; sfx.door();
            setTimeout(() => {
                inPubLevel = entering; worldGroup.visible = !entering; pubLevelGroup.visible = entering;
                if (entering) {
                    player.position.set(-5, 2, 2);
                    scene.background = new THREE.Color(0x000000);
                } else {
                    // Spawn player slightly in front of the door (offset -2.0)
                    player.position.set(pubBuilding ? pubBuilding.position.x - 2.0 : 0, 1.2, 2);
                    scene.background = new THREE.Color(0x0a0a1a);
                }
                fade.style.opacity = '0'; updateUI();
            }, 500);
        }

        function triggerRespawn() {
            if (player.userData.isRespawning) return;
            player.userData.isRespawning = true; sfx.damage();
            const fade = document.getElementById('fade-overlay'); fade.style.opacity = '1';
            const penalty = Math.floor(stats.gold * 0.2); stats.gold -= penalty;
            showMessage(`Defeated! Lost ${penalty} Gold.`);
            setTimeout(() => {
                inPubLevel = false; worldGroup.visible = true; pubLevelGroup.visible = false;
                player.position.set(0, 4, 2); player.userData.vy = 0; player.userData.isRespawning = false;
                fade.style.opacity = '0'; updateUI();
            }, 1000);
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!gameActive || isPaused || player.userData.isRespawning) { renderer.render(scene, camera); return; }
            const speed = 0.15 * stats.speedMult;
            let isMoving = false, moveX = 0;
            if(keys['KeyA'] || keys['ArrowLeft']) { moveX -= speed; player.userData.facingRight = false; isMoving = true; }
            if(keys['KeyD'] || keys['ArrowRight']) { moveX += speed; player.userData.facingRight = true; isMoving = true; }
            if (moveX !== 0) {
                const oldX = player.position.x; player.position.x += moveX;
                platforms.forEach(p => { if(!p.group.visible) return; if (Math.abs(player.position.x - p.x) < (p.w/2 + player.userData.width/2) && Math.abs(player.position.y - p.y) < (p.h/2 + player.userData.height/2)) player.position.x = oldX; });
            }
            player.userData.vy += GRAVITY;
            const oldY = player.position.y; player.position.y += player.userData.vy;
            player.userData.onGround = false;
            platforms.forEach(p => {
                if(!p.group.visible) return;
                const pL = p.x - p.w/2, pR = p.x + p.w/2, pT = p.y + p.h/2, pB = p.y - p.h/2;
                const rL = player.position.x - player.userData.width/2, rR = player.position.x + player.userData.width/2, rT = player.position.y + player.userData.height/2, rB = player.position.y - player.userData.height/2;
                if (rL < pR && rR > pL && rB < pT && rT > pB) {
                    if (player.userData.vy < 0) { player.position.y = pT + player.userData.height/2; player.userData.vy = 0; player.userData.onGround = true; } 
                    else if (player.userData.vy > 0) { player.position.y = pB - player.userData.height/2; player.userData.vy = 0; }
                }
            });
            let targetAnim = isMoving ? (player.userData.facingRight ? 'runRight' : 'runLeft') : 'stand';
            if (player.userData.currentAnim !== targetAnim) { player.userData.currentAnim = targetAnim; player.userData.animFrame = 0; player.userData.animTimer = 0; player.material = MATERIALS[targetAnim === 'stand' ? 'playerStand' : (targetAnim === 'runRight' ? 'playerRunRight' : 'runLeft')]; }
            if (targetAnim === 'stand') { if (player.material.map) player.material.map.offset.x = player.userData.facingRight ? 0.5 : 0; } 
            else { if (++player.userData.animTimer > 5) { player.userData.animFrame = (player.userData.animFrame + 1) % 11; player.userData.animTimer = 0; } if (player.material.map) player.material.map.offset.x = player.userData.animFrame / 11; }
            if (!inPubLevel) {
                const px = player.position.x, camX = camera.position.x, camY = camera.position.y;
                let tO = 1, lFO = 0, rFO = 0; if (px < -BIOME_RANGE) { const f = Math.min(1, Math.abs(px + BIOME_RANGE) / 20); tO = 1 - f; lFO = f; } else if (px > BIOME_RANGE) { const f = Math.min(1, (px - BIOME_RANGE) / 20); tO = 1 - f; rFO = f; }
                const sHW = VIEW_SIZE * TARGET_ASPECT;
                Object.keys(bgLayers).forEach(k => { const m = bgLayers[k]; const tOp = k === 'town' ? tO : (k === 'forestLeft' ? lFO : rFO); m.material.opacity = THREE.MathUtils.lerp(m.material.opacity, tOp, 0.05); const dX = m.userData.startX + (camX * 0.98); m.position.x = Math.max(camX + sHW - m.userData.w/2, Math.min(camX - sHW + m.userData.w/2, dX)); m.position.y = (camY - VIEW_SIZE) + (m.userData.h / 2); });
            }
            camera.position.x += (player.position.x - camera.position.x) * 0.1; camera.position.y += (Math.max(4, player.position.y + 1) - camera.position.y) * 0.05;
            
            let foundInt = false;
            // Updated hover detect area for the scaled pub door
            if (!inPubLevel && pubBuilding && pubBuilding.parent === worldGroup) { 
                if (Math.abs(player.position.x - (pubBuilding.position.x - 2.0)) < 1.5) { 
                    pubBuilding.material = MATERIALS.pubOpen; 
                    foundInt = true; 
                } else {
                    pubBuilding.material = MATERIALS.pub; 
                }
            } else if (inPubLevel && Math.abs(player.position.x - (-6)) < 1.5) {
                foundInt = true;
            }

            if (!foundInt) npcs.forEach(n => { if (n.group.visible && player.position.distanceTo(n.sprite.position) < 2.5) foundInt = true; });
            interactSprite.visible = foundInt; if (foundInt) interactSprite.position.set(player.position.x, player.position.y + 1.6 + Math.sin(Date.now() * 0.01) * 0.1, 3);
            
            npcs.forEach(n => {
                const s = n.sprite;
                if (!n.group.visible) return;
                s.userData.timer -= 16;
                if (s.userData.timer <= 0) {
                    if (s.userData.state === 'idle') { s.userData.state = 'moving'; s.userData.dir = Math.random() > 0.5 ? 1 : -1; s.userData.timer = 1000 + Math.random() * 2000; } 
                    else { s.userData.state = 'idle'; s.userData.timer = 2000 + Math.random() * 4000; }
                }
                if (s.userData.state === 'moving') {
                    const nextX = s.position.x + s.userData.moveSpeed * s.userData.dir;
                    if (Math.abs(nextX - s.userData.startX) > s.userData.wanderRange) s.userData.dir *= -1; else s.position.x = nextX;
                }
                if (s.userData.helper) s.userData.helper.update();
            });

            enemies.forEach(en => { if(!en.parent || !en.parent.visible) return; en.position.x += 0.04 * en.userData.dir; if(Math.abs(en.position.x - en.userData.startX) > en.userData.range) en.userData.dir *= -1; if(player.position.distanceTo(en.position) < 1.0) { if(stats.potions > 0) { stats.potions--; player.position.y += 2; sfx.damage(); showMessage("Used Potion!"); } else triggerRespawn(); } if (en.userData.helper) en.userData.helper.update(); });
            projectiles.forEach((p, i) => { p.position.x += p.userData.vx; enemies.forEach((en, ei) => { if(!en.parent || !en.parent.visible) return; if (p.position.distanceTo(en.position) < 1) { en.parent.remove(en); enemies.splice(ei, 1); scene.remove(p); projectiles.splice(i, 1); stats.gold += 5; sfx.collect(); } }); if (Math.abs(p.position.x - player.position.x) > 15) { scene.remove(p); projectiles.splice(i, 1); } });
            if(player.userData.helper) player.userData.helper.position.copy(player.position);
            updateUI(); renderer.render(scene, camera);
        }

        function createBoxHelper(m, c = 0x00ff00) { const b = new THREE.BoxHelper(m, c); scene.add(b); b.visible = wireframeMode; return b; }
        function toggleWireframe() { wireframeMode = !wireframeMode; document.getElementById('wireframe-btn').innerText = `Wireframe Mode: ${wireframeMode ? 'ON' : 'OFF'}`; platforms.forEach(p => { if(p.helper) p.helper.visible = wireframeMode; }); if(player.userData.helper) player.userData.helper.visible = wireframeMode; npcs.forEach(n => { if(n.sprite.userData.helper) n.sprite.userData.helper.visible = wireframeMode; }); enemies.forEach(e => { if(e.userData.helper) e.userData.helper.visible = wireframeMode; }); }
        function shoot() { if(!gameActive || isPaused || player.userData.isRespawning) return; sfx.shoot(); const b = new THREE.Sprite(MATERIALS.bullet); b.position.copy(player.position); b.scale.set(0.6, 0.6, 1); b.userData = { vx: player.userData.facingRight ? 0.4 : -0.4 }; projectiles.push(b); scene.add(b); }
        function onNewGame() { initAudio(); document.getElementById('menu-screen').style.display = 'none'; const iv = document.getElementById('intro-video'); document.getElementById('intro-overlay').style.display = 'flex'; iv.play().catch(() => startGame()); iv.onended = () => { document.getElementById('intro-overlay').style.display = 'none'; startGame(); }; }
        function startGame() { gameActive = true; document.getElementById('game-ui').classList.remove('hidden'); switchMusicToGame(); }
        function openOptions() { initAudio(); document.getElementById('options-overlay').style.display = 'flex'; if (gameActive) isPaused = true; }
        function closeOptions() { document.getElementById('options-overlay').style.display = 'none'; if (gameActive) isPaused = false; }
        function toggleOptionsFromKey() { if (!gameActive) return; isPaused ? closeOptions() : openOptions(); }
        function toggleMusic() { musicEnabled = !musicEnabled; document.getElementById('music-btn').innerText = musicEnabled ? "Music: ON" : "Music: OFF"; const m = gameActive ? document.getElementById('game-music') : document.getElementById('menu-music'); if (musicEnabled) m.play().catch(()=>{}); else m.pause(); }
        function toggleSfx() { sfxEnabled = !sfxEnabled; document.getElementById('sfx-btn').innerText = sfxEnabled ? "Sounds: ON" : "Sounds: OFF"; }
        function updateVolume(v) { globalMusicVol = v/100; document.getElementById('vol-label').innerText = v + "%"; const m = document.getElementById('menu-music'), g = document.getElementById('game-music'); if(m) m.volume = globalMusicVol; if(g) g.volume = globalMusicVol; }
        function updateUI() { const px = player.position.x; let zone = "SpriteVille"; if (px < -BIOME_RANGE) zone = "Dark Forest"; else if (px > BIOME_RANGE) zone = "Golden Forest"; if (inPubLevel) zone = "Sprite Lounge"; document.getElementById('gold-val').innerText = stats.gold; document.getElementById('pot-val').innerText = stats.potions; document.getElementById('zone-display').innerText = zone; }
        function showMessage(msg) { const viewport = document.getElementById('game-viewport'); const b = document.createElement('div'); b.className = "absolute bottom-1/4 left-1/2 -translate-x-1/2 bg-yellow-400 p-2 rounded-xl z-[1000] text-black shadow-lg text-center min-w-[150px] text-sm"; b.innerText = msg; viewport.appendChild(b); setTimeout(() => b.remove(), 2500); }
        function buyItem(id, p) { if(stats.gold >= p) { stats.gold -= p; sfx.collect(); if(id === 'potion') stats.potions++; if(id === 'boots') { stats.speedMult = 1.5; showMessage("Speed Increased!"); } updateUI(); } else showMessage("Not enough gold!"); }
        function closeShop() { document.getElementById('shop-ui').style.display = 'none'; }
        function onResize() { const viewport = document.getElementById('game-viewport'); const windowW = window.innerWidth, windowH = window.innerHeight, windowAspect = windowW / windowH; let finalW, finalH; if (windowAspect > TARGET_ASPECT) { finalH = windowH; finalW = windowH * TARGET_ASPECT; } else { finalW = windowW; finalH = windowW / TARGET_ASPECT; } viewport.style.width = finalW + 'px'; viewport.style.height = finalH + 'px'; renderer.setSize(finalW, finalH); camera.updateProjectionMatrix(); }
        window.onload = init;
    </script>
</body>
