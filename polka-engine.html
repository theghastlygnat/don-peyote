<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Sprite Open World - Debug Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Luckiest Guy', cursive; }
        canvas { display: block; }
        
        .full-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
        }

        #menu-screen {
            background: url('https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-start-screen.png');
            background-color: #1e3a8a;
            background-size: cover;
            background-position: center;
            z-index: 300;
            pointer-events: auto;
            justify-content: flex-end;
            padding-bottom: 8vh;
        }

        .menu-card {
            background: rgba(0, 0, 0, 0.7);
            padding: 1rem 2rem;
            border-radius: 50px;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: row;
            gap: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .menu-btn {
            padding: 0.5rem 1.5rem;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.5rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s;
            text-shadow: 2px 2px 0px #000;
        }

        .menu-btn:hover { transform: scale(1.1); color: #22d3ee; }

        #options-overlay, #debug-menu-overlay {
            background: rgba(0,0,0,0.85);
            z-index: 500;
            display: none;
            pointer-events: auto;
        }

        .options-panel {
            background: #1e293b;
            padding: 2rem;
            border-radius: 30px;
            border: 4px solid #22d3ee;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            min-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* Debug Styles */
        #performance-hud {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: #00ff00;
            font-family: 'JetBrains Mono', monospace;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            z-index: 1000;
            border: 1px solid #00ff00;
        }

        #game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
            display: flex;
            flex-direction: column; gap: 5px;
        }

        .debug-toggle-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 12px 16px;
            border-radius: 12px;
            color: #94a3b8;
            transition: all 0.2s;
        }

        .debug-toggle-item.active { color: #facc15; background: rgba(250, 204, 21, 0.1); border: 1px solid rgba(250, 204, 21, 0.3); }

        .volume-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: #334155;
            outline: none;
            border-radius: 5px;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #22d3ee;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body onclick="tryStartMenuMusic()">

    <audio id="menu-music" loop><source src="https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-theme.mp3" type="audio/mpeg"></audio>
    <audio id="game-music" loop><source src="https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/Whispers_of_the_Verdant_Keep.mp3" type="audio/mpeg"></audio>

    <!-- PERFORMANCE HUD (TOGGLEABLE) -->
    <div id="performance-hud">
        <div class="text-xs opacity-50 mb-1 border-b border-green-900">SYSTEM STATS</div>
        <div>FPS: <span id="fps-val">60</span></div>
        <div>POS: <span id="pos-val">0, 0</span></div>
        <div>VEL: <span id="vel-val">0.00</span></div>
        <div>ENTITIES: <span id="sprite-count">0</span></div>
    </div>

    <!-- START MENU -->
    <div id="menu-screen" class="full-overlay">
        <div class="menu-card">
            <button onclick="onNewGame()" class="menu-btn">New Game</button>
            <button onclick="openOptions()" class="menu-btn">Settings</button>
        </div>
    </div>

    <!-- SETTINGS MENU -->
    <div id="options-overlay" class="full-overlay">
        <div class="options-panel">
            <h2 class="text-3xl text-cyan-400 text-center mb-2">Settings</h2>
            
            <div class="space-y-4">
                <div class="bg-slate-800/50 p-4 rounded-2xl">
                    <button onclick="toggleMusic()" id="music-btn" class="w-full py-2 bg-slate-700 rounded-lg text-white mb-2">Music: ON</button>
                    <div class="px-2">
                        <label class="text-xs text-slate-400 block mb-1">Volume</label>
                        <input type="range" min="0" max="100" value="40" class="volume-slider" oninput="updateVolume(this.value)">
                    </div>
                </div>

                <button onclick="openDebugMenu()" class="w-full py-4 bg-yellow-600/20 border border-yellow-500/50 rounded-2xl text-yellow-400 font-bold hover:bg-yellow-600/30 transition-all">
                    🛠 OPEN DEBUG HUB
                </button>
            </div>

            <button onclick="closeOptions()" class="mt-4 p-3 bg-cyan-600 text-white rounded-xl">Close</button>
        </div>
    </div>

    <!-- DEBUG HUB MENU (NEW) -->
    <div id="debug-menu-overlay" class="full-overlay">
        <div class="options-panel border-yellow-500">
            <h2 class="text-3xl text-yellow-500 text-center mb-2">Debug Hub</h2>
            <p class="text-slate-400 text-center text-sm mb-4 font-mono">Development Diagnostic Tools</p>
            
            <div class="flex flex-col gap-3">
                <div class="debug-toggle-item" id="toggle-wire">
                    <span>Wireframe Hitboxes</span>
                    <input type="checkbox" class="w-5 h-5 accent-yellow-500" onchange="toggleDebug('wireframe')">
                </div>
                <div class="debug-toggle-item" id="toggle-perf">
                    <span>Performance Stats (HUD)</span>
                    <input type="checkbox" class="w-5 h-5 accent-yellow-500" onchange="toggleDebug('perf')">
                </div>
                <div class="debug-toggle-item" id="toggle-vectors">
                    <span>Velocity Vectors</span>
                    <input type="checkbox" class="w-5 h-5 accent-yellow-500" onchange="toggleDebug('vectors')">
                </div>
                <div class="debug-toggle-item" id="toggle-noclip">
                    <span>No-Clip Mode (Flight)</span>
                    <input type="checkbox" class="w-5 h-5 accent-yellow-500" onchange="toggleDebug('noclip')">
                </div>
            </div>

            <button onclick="backToOptions()" class="mt-6 p-3 bg-slate-700 text-white rounded-xl">Back to Settings</button>
        </div>
    </div>

    <!-- IN-GAME UI -->
    <div id="game-ui" class="hidden">
        <div id="zone-display" class="text-3xl text-cyan-400">SpriteVille</div>
        <div id="stats" class="text-xl">Gold: <span id="gold-val">0</span></div>
    </div>

    <script>
        // --- GLOBALS ---
        let scene, camera, renderer, clock;
        let player, enemies = [], platforms = [], projectiles = [];
        let keys = {};
        let gameActive = false, isPaused = false;
        let audioCtx, globalMusicVol = 0.4, musicEnabled = true;
        
        // Debug Engine State
        let debug = {
            wireframe: false,
            perf: false,
            vectors: false,
            noclip: false,
            fps: 0,
            frames: 0,
            prevTime: performance.now()
        };

        const VIEW_SIZE = 4.2;
        const textureLoader = new THREE.TextureLoader();
        let MATERIALS = {};

        const SPRITES = {
            player: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-standing-sprite-sheet-2x1-140Px140P.png',
            enemy: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/129.png',
            brick: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/11.png',
            bullet: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/items/poke-ball.png'
        };

        // --- NAVIGATION LOGIC ---
        function openOptions() { 
            isPaused = true; 
            document.getElementById('options-overlay').style.display = 'flex'; 
        }

        function closeOptions() { 
            isPaused = false; 
            document.getElementById('options-overlay').style.display = 'none'; 
            document.getElementById('debug-menu-overlay').style.display = 'none';
        }

        function openDebugMenu() {
            document.getElementById('options-overlay').style.display = 'none';
            document.getElementById('debug-menu-overlay').style.display = 'flex';
        }

        function backToOptions() {
            document.getElementById('debug-menu-overlay').style.display = 'none';
            document.getElementById('options-overlay').style.display = 'flex';
        }

        function toggleDebug(type) {
            debug[type] = !debug[type];
            const el = document.getElementById(`toggle-${type}`);
            if(el) el.classList.toggle('active', debug[type]);
            
            if(type === 'perf') {
                document.getElementById('performance-hud').style.display = debug.perf ? 'block' : 'none';
            }
            if(type === 'vectors' && player) {
                player.userData.vectorLine.visible = debug.vectors;
            }
        }

        // --- CORE ENGINE ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);

            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.OrthographicCamera(-VIEW_SIZE * aspect, VIEW_SIZE * aspect, VIEW_SIZE, -VIEW_SIZE, 0.1, 1000);
            camera.position.set(0, 5, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            MATERIALS.player = new THREE.SpriteMaterial({ map: textureLoader.load(SPRITES.player) });
            MATERIALS.enemy = new THREE.SpriteMaterial({ map: textureLoader.load(SPRITES.enemy) });
            MATERIALS.brick = new THREE.SpriteMaterial({ map: textureLoader.load(SPRITES.brick) });
            MATERIALS.bullet = new THREE.SpriteMaterial({ map: textureLoader.load(SPRITES.bullet) });

            buildWorld();
            createPlayer();

            window.addEventListener('keydown', e => {
                keys[e.code] = true;
                if(e.code === 'Enter') shoot();
                if(e.code === 'Escape') toggleGamePause();
            });
            window.addEventListener('keyup', e => keys[e.code] = false);
            
            animate();
        }

        function createPlayer() {
            player = new THREE.Sprite(MATERIALS.player);
            player.scale.set(2, 2, 1);
            player.position.set(0, 5, 2);
            
            // Hitbox Helper (Cyan)
            const box = new THREE.BoxHelper(player, 0x00ffff);
            box.visible = false;
            scene.add(box);

            // Vector Line (Yellow)
            const lineMat = new THREE.LineBasicMaterial({ color: 0xffff00 });
            const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,0)]);
            const vectorLine = new THREE.Line(lineGeo, lineMat);
            vectorLine.visible = false;
            scene.add(vectorLine);

            player.userData = { 
                vx: 0, vy: 0, onGround: false, helper: box, vectorLine: vectorLine 
            };
            scene.add(player);
        }

        function buildWorld() {
            for(let i=0; i<20; i++) {
                addPlatform(i*6 - 20, 0, 5, 1);
            }
            for(let i=0; i<8; i++) {
                addPlatform(i*10, 4, 3, 0.5);
                if(i > 0) spawnEnemy(i*10, 5.5);
            }
        }

        function addPlatform(x, y, w, h) {
            const p = new THREE.Sprite(MATERIALS.brick);
            p.scale.set(w, h, 1);
            p.position.set(x, y, 1);
            scene.add(p);
            
            // Platform Helper (Green)
            const helper = new THREE.Mesh(
                new THREE.BoxGeometry(w, h, 0.1), 
                new THREE.MeshBasicMaterial({color: 0x00ff00, wireframe: true})
            );
            helper.position.set(x, y, 1.1);
            helper.visible = false;
            scene.add(helper);

            platforms.push({ x, y, w, h, helper });
        }

        function spawnEnemy(x, y) {
            const e = new THREE.Sprite(MATERIALS.enemy);
            e.position.set(x, y, 2);
            e.scale.set(1.2, 1.2, 1);
            const helper = new THREE.BoxHelper(e, 0xff0000); // Enemy Helper (Red)
            helper.visible = false;
            scene.add(helper);
            e.userData = { helper, startX: x, dir: 1 };
            enemies.push(e);
            scene.add(e);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // FPS Counter
            debug.frames++;
            const time = performance.now();
            if (time >= debug.prevTime + 1000) {
                debug.fps = Math.round((debug.frames * 1000) / (time - debug.prevTime));
                debug.frames = 0;
                debug.prevTime = time;
                if(debug.perf) document.getElementById('fps-val').innerText = debug.fps;
            }

            if(!gameActive || isPaused) {
                renderer.render(scene, camera);
                return;
            }

            // Movement Logic
            let speed = debug.noclip ? 0.25 : 0.12;
            player.userData.vx = 0;
            if(keys['KeyA']) player.userData.vx = -speed;
            if(keys['KeyD']) player.userData.vx = speed;
            
            if(debug.noclip) {
                if(keys['KeyW']) player.position.y += speed;
                if(keys['KeyS']) player.position.y -= speed;
                player.userData.vy = 0;
            } else {
                player.userData.vy -= 0.015; // Gravity
            }

            player.position.x += player.userData.vx;
            player.position.y += player.userData.vy;

            // Collision Physics
            if(!debug.noclip) {
                player.userData.onGround = false;
                platforms.forEach(p => {
                    if(Math.abs(player.position.x - p.x) < (p.w/2 + 0.5)) {
                        const top = p.y + p.h/2;
                        if(player.position.y - 1 <= top && player.position.y > p.y && player.userData.vy <= 0) {
                            player.position.y = top + 1;
                            player.userData.vy = 0;
                            player.userData.onGround = true;
                        }
                    }
                });
                if(keys['Space'] && player.userData.onGround) player.userData.vy = 0.3;
            }

            // Enemy Movement
            enemies.forEach(e => {
                e.position.x += 0.03 * e.userData.dir;
                if(Math.abs(e.position.x - e.userData.startX) > 4) e.userData.dir *= -1;
            });

            // Update Debug Visuals
            if(debug.wireframe) {
                player.userData.helper.update();
                player.userData.helper.visible = true;
                platforms.forEach(p => p.helper.visible = true);
                enemies.forEach(e => { e.userData.helper.update(); e.userData.helper.visible = true; });
            } else {
                player.userData.helper.visible = false;
                platforms.forEach(p => p.helper.visible = false);
                enemies.forEach(e => e.userData.helper.visible = false);
            }

            if(debug.vectors) {
                const points = [
                    new THREE.Vector3(player.position.x, player.position.y, 3),
                    new THREE.Vector3(
                        player.position.x + player.userData.vx * 15, 
                        player.position.y + player.userData.vy * 15, 
                        3
                    )
                ];
                player.userData.vectorLine.geometry.setFromPoints(points);
            }

            // Performance HUD Update
            if(debug.perf) {
                document.getElementById('pos-val').innerText = `${player.position.x.toFixed(1)}, ${player.position.y.toFixed(1)}`;
                document.getElementById('vel-val').innerText = player.userData.vy.toFixed(3);
                document.getElementById('sprite-count').innerText = scene.children.length;
            }

            camera.position.x += (player.position.x - camera.position.x) * 0.1;
            renderer.render(scene, camera);
        }

        function onNewGame() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-ui').classList.remove('hidden');
            gameActive = true;
        }

        function toggleGamePause() {
            if (!gameActive) return;
            if (isPaused) closeOptions(); else openOptions();
        }

        function tryStartMenuMusic() { /* Placeholder for audio context handling */ }
        function updateVolume(v) { globalMusicVol = v/100; }
        function toggleMusic() { musicEnabled = !musicEnabled; document.getElementById('music-btn').innerText = `Music: ${musicEnabled?'ON':'OFF'}`; }
        function shoot() { /* Logic for projectile spawning */ }

        window.onload = init;
    </script>
</body>
</html>
