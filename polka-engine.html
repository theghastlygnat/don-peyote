<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Sprite Open World - Optimized Backgrounds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Luckiest Guy', cursive; }
        canvas { display: block; }
        
        .full-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
        }

        #menu-screen {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-start-screen.png');
            background-color: #1e3a8a;
            background-size: cover;
            background-position: center;
            z-index: 300;
            pointer-events: auto;
            justify-content: flex-end;
            padding-bottom: 8vh;
        }

        .menu-card {
            background: rgba(0, 0, 0, 0.7);
            padding: 1rem 2rem;
            border-radius: 50px;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: row;
            gap: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .menu-btn {
            padding: 0.5rem 1.5rem;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.5rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s;
            text-shadow: 2px 2px 0px #000;
        }

        .menu-btn:hover { transform: scale(1.1); color: #22d3ee; }

        #options-overlay {
            background: rgba(0,0,0,0.85);
            z-index: 500;
            display: none;
            pointer-events: auto;
        }

        .options-panel {
            background: #1e293b;
            padding: 2rem;
            border-radius: 30px;
            border: 4px solid #22d3ee;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-width: 380px;
        }

        #game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
            display: flex;
            flex-direction: column; gap: 5px;
        }

        #shop-ui {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 4px solid #facc15;
            padding: 2rem;
            border-radius: 20px;
            color: white;
            display: none;
            z-index: 500;
            pointer-events: auto;
        }

        .buy-btn {
            background: #16a34a;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        #intro-overlay {
            background: black;
            z-index: 400;
            display: none;
            pointer-events: auto;
        }
        
        #intro-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #fade-overlay {
            position: fixed;
            inset: 0;
            background: black;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            z-index: 1000;
        }
    </style>
</head>
<body onclick="tryStartMenuMusic()">

    <audio id="menu-music" loop><source src="https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-theme.mp3" type="audio/mpeg"></audio>
    <audio id="game-music" loop><source src="https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/Whispers_of_the_Verdant_Keep.mp3" type="audio/mpeg"></audio>

    <div id="fade-overlay"></div>

    <div id="menu-screen" class="full-overlay">
        <div class="menu-card">
            <button onclick="onNewGame()" class="menu-btn">New Game</button>
            <button onclick="showMessage('Demo Mode Only')" class="menu-btn">Load</button>
            <button onclick="openOptions()" class="menu-btn">Options</button>
        </div>
    </div>

    <div id="options-overlay" class="full-overlay">
        <div class="options-panel">
            <h2 class="text-4xl text-cyan-400 text-center mb-2">Settings</h2>
            <button onclick="toggleMusic()" id="music-btn" class="menu-btn bg-cyan-900/50 rounded-lg text-lg py-2">Music: ON</button>
            <button onclick="toggleSfx()" id="sfx-btn" class="menu-btn bg-cyan-900/50 rounded-lg text-lg py-2">Sounds: ON</button>
            <button onclick="toggleWireframe()" id="wireframe-btn" class="w-full py-2 bg-yellow-900/30 border border-yellow-500/50 rounded-lg text-white">Wireframe: OFF</button>
            <button onclick="closeOptions()" class="mt-4 p-3 bg-red-600/80 text-white rounded-xl">Close</button>
        </div>
    </div>

    <div id="intro-overlay" class="full-overlay">
        <video id="intro-video" preload="auto">
            <source src="https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-start-screen-grok.mp4" type="video/mp4">
        </video>
    </div>

    <div id="game-ui" class="hidden">
        <div id="zone-display" class="text-3xl text-cyan-400">SpriteVille</div>
        <div id="stats" class="text-xl">Gold: <span id="gold-val">0</span> | Potions: <span id="pot-val">0</span></div>
    </div>

    <div id="shop-ui">
        <h2 class="text-2xl text-yellow-400 mb-4 text-center">Town Shop</h2>
        <div class="flex flex-col gap-2">
            <div class="flex justify-between items-center"><span>Health Potion</span><button class="buy-btn" onclick="buyItem('potion', 10)">10G</button></div>
            <div class="flex justify-between items-center"><span>Speed Boots</span><button class="buy-btn" onclick="buyItem('boots', 50)">50G</button></div>
        </div>
        <button class="mt-4 w-full text-red-400" onclick="closeShop()">Close</button>
    </div>

    <script>
        // --- CORE STATE ---
        let scene, camera, renderer, clock;
        let player, interactSprite, bgLayers = {}, enemies = [], platforms = [], npcs = [], projectiles = [];
        let keys = {};
        let gameActive = false, isPaused = false, wireframeMode = false, isInside = false;
        let stats = { gold: 0, potions: 0, speedMult: 1 };
        
        const VIEW_SIZE = 4.2;
        const BIOME_RANGE = 50; 
        const townCenter = 0;
        
        let worldGroup, interiorGroup; 
        let pubBuilding = null;
        let MATERIALS = {};

        const SPRITES = {
            playerStand: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-standing-sprite-sheet-2x1-140Px140P.png',
            playerRunLeft: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-run-cycle-left-12fps.png',
            playerRunRight: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-run-cycle-right-12fps.png',
            enemy: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/129.png',
            npc: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/151.png',
            shopkeeper: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/122.png',
            grass: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/1.png',
            brick: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/11.png',
            bullet: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/items/poke-ball.png',
            pub: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/pub850x700.png',
            pubOpen: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/pub-door-open-850x700.png',
            bgTown: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/townbg-1-grok.jpg',
            bgForestLeft: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/forestbg-1-grok.jpg',
            bgForestRight: 'https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/forestbg-2-grok.jpg'
        };

        const textureLoader = new THREE.TextureLoader();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x05050a);
            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.OrthographicCamera(-VIEW_SIZE * aspect, VIEW_SIZE * aspect, VIEW_SIZE, -VIEW_SIZE, 0.1, 1000);
            camera.position.set(0, 5, 20);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            
            scene.add(new THREE.AmbientLight(0xffffff, 1.2));
            clock = new THREE.Clock();

            // Load Materials
            const createMat = (url, tilesX = 1) => {
                const mat = new THREE.SpriteMaterial({ map: null, transparent: true });
                textureLoader.load(url, (t) => {
                    t.magFilter = THREE.NearestFilter;
                    if (tilesX > 1) t.repeat.set(1 / tilesX, 1);
                    mat.map = t; mat.needsUpdate = true;
                });
                return mat;
            };

            MATERIALS = {
                playerStand: createMat(SPRITES.playerStand, 2),
                playerRunLeft: createMat(SPRITES.playerRunLeft, 11),
                playerRunRight: createMat(SPRITES.playerRunRight, 11),
                enemy: createMat(SPRITES.enemy),
                npc: createMat(SPRITES.npc),
                shopkeeper: createMat(SPRITES.shopkeeper),
                grass: createMat(SPRITES.grass),
                brick: createMat(SPRITES.brick),
                bullet: createMat(SPRITES.bullet),
                pub: createMat(SPRITES.pub),
                pubOpen: createMat(SPRITES.pubOpen),
                exclamation: new THREE.SpriteMaterial({ 
                    map: (function(){
                        const c = document.createElement('canvas'); c.width=64; c.height=64;
                        const ctx = c.getContext('2d'); ctx.fillStyle='#facc15'; ctx.beginPath(); ctx.arc(32,32,25,0,Math.PI*2); ctx.fill();
                        ctx.fillStyle='#000'; ctx.fillRect(29,15,6,20); ctx.fillRect(29,40,6,6);
                        return new THREE.CanvasTexture(c);
                    })(), 
                    transparent: true 
                })
            };

            worldGroup = new THREE.Group();
            interiorGroup = new THREE.Group();
            interiorGroup.visible = false;
            scene.add(worldGroup);
            scene.add(interiorGroup);

            buildBackgrounds();
            buildWorld();
            buildInterior();
            createPlayer();

            window.addEventListener('keydown', e => { 
                keys[e.code] = true;
                if(e.code === 'KeyE') handleInteraction();
                if(e.code === 'Enter') shoot();
            });
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('resize', onResize);
            animate();
        }

        function buildBackgrounds() {
            // REDUCED SIZE: Height 5 instead of 10 (50% smaller)
            const h = 5.2; 
            const w = h * (16/9);

            const configs = [
                { id: 'town', url: SPRITES.bgTown, z: -4 },
                { id: 'forestLeft', url: SPRITES.bgForestLeft, z: -4.1 },
                { id: 'forestRight', url: SPRITES.bgForestRight, z: -4.1 }
            ];

            configs.forEach(conf => {
                const group = new THREE.Group();
                textureLoader.load(conf.url, (tex) => {
                    tex.magFilter = THREE.LinearFilter;
                    // Tiles to cover 1000+ units of world
                    for (let i = -10; i <= 25; i++) {
                        const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: conf.id === 'town' ? 1 : 0 });
                        const plane = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
                        plane.position.set(i * w, 3.8, conf.z); // Fixed height near gameplay floor
                        group.add(plane);
                    }
                });
                bgLayers[conf.id] = group;
                worldGroup.add(group);
            });
        }

        function createPlayer() {
            player = new THREE.Sprite(MATERIALS.playerStand);
            player.scale.set(2.2, 2.2, 1);
            player.position.set(townCenter, 5, 2);
            player.userData = { vy: 0, onGround: false, facingRight: true, currentAnim: 'stand', animFrame: 0, animTimer: 0 };
            scene.add(player);

            interactSprite = new THREE.Sprite(MATERIALS.exclamation);
            interactSprite.scale.set(0.6, 0.6, 1);
            interactSprite.visible = false;
            scene.add(interactSprite);
        }

        function buildWorld() {
            // Floor
            for(let x = -400; x < 1000; x += 2) {
                const tile = new THREE.Sprite(MATERIALS.grass);
                tile.scale.set(2, 2, 1); tile.position.set(x, 0, 1);
                worldGroup.add(tile);
            }
            platforms.push({ x: 300, y: 0, w: 2000, h: 2, group: worldGroup });

            // Town Center
            pubBuilding = new THREE.Sprite(MATERIALS.pub);
            pubBuilding.position.set(townCenter - 25, 3.4, 0.5); 
            pubBuilding.scale.set(5.06, 4.21, 1);
            worldGroup.add(pubBuilding);

            spawnNPC(townCenter + 5, 2, 'shopkeeper', { type: 'shop' }, worldGroup);
            spawnNPC(townCenter - 8, 2, 'npc', { type: 'npc', msg: 'The world is big beyond the forest!' }, worldGroup);

            // Level Gen
            for(let i=0; i<300; i++) {
                const x = (Math.random() * 1400) - 400;
                if(Math.abs(x - townCenter) < 40) continue; 
                const y = 3 + Math.random() * 7;
                addPlatform(x, y, 3, 0.8, worldGroup);
                if(Math.random() > 0.7) spawnEnemy(x, y + 1.1);
            }
        }

        function buildInterior() {
            addPlatform(0, 0, 20, 2, interiorGroup); 
            addPlatform(-10.5, 5, 1, 12, interiorGroup); 
            addPlatform(10.5, 5, 1, 12, interiorGroup); 
            spawnNPC(4, 2, 'npc', { type: 'npc', msg: 'Quiet night at the pub.' }, interiorGroup);
        }

        function addPlatform(x, y, w, h, group) {
            const p = new THREE.Sprite(MATERIALS.brick);
            p.scale.set(w, h, 1); p.position.set(x, y, 1);
            group.add(p);
            platforms.push({ x, y, w, h, group });
        }

        function spawnNPC(x, y, matKey, data, group) {
            const npc = new THREE.Sprite(MATERIALS[matKey]);
            npc.position.set(x, y, 1.5); npc.scale.set(1.6, 1.6, 1);
            npc.userData = data;
            npcs.push({ sprite: npc, group });
            group.add(npc);
        }

        function spawnEnemy(x, y) {
            const enemy = new THREE.Sprite(MATERIALS.enemy);
            enemy.position.set(x, y, 2); enemy.scale.set(1.2, 1.2, 1);
            enemy.userData = { startX: x, range: 4, dir: 1 };
            enemies.push(enemy);
            worldGroup.add(enemy);
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!gameActive || isPaused) return;

            const dt = clock.getDelta();
            const speed = 0.15 * stats.speedMult;
            let isMoving = false;

            if(keys['KeyA'] || keys['ArrowLeft']) { player.position.x -= speed; player.userData.facingRight = false; isMoving = true; }
            if(keys['KeyD'] || keys['ArrowRight']) { player.position.x += speed; player.userData.facingRight = true; isMoving = true; }

            // Anim State
            let targetAnim = isMoving ? (player.userData.facingRight ? 'runRight' : 'runLeft') : 'stand';
            if (player.userData.currentAnim !== targetAnim) {
                player.userData.currentAnim = targetAnim;
                player.userData.animFrame = 0;
                player.material = MATERIALS[targetAnim === 'stand' ? 'playerStand' : (targetAnim === 'runRight' ? 'playerRunRight' : 'playerRunLeft')];
            }
            if (targetAnim !== 'stand') {
                if (++player.userData.animTimer > 5) { player.userData.animFrame = (player.userData.animFrame + 1) % 11; player.userData.animTimer = 0; }
                if (player.material.map) player.material.map.offset.x = player.userData.animFrame / 11;
            } else {
                if (player.material.map) player.material.map.offset.x = player.userData.facingRight ? 0.5 : 0;
            }

            // Physics
            player.userData.vy -= 0.015;
            player.position.y += player.userData.vy;
            player.userData.onGround = false;

            platforms.forEach(p => {
                if(!p.group.visible) return;
                if(Math.abs(player.position.x - p.x) < (p.w/2 + 0.6)) {
                    const top = p.y + p.h/2;
                    if(player.position.y - 1.1 <= top && player.position.y > p.y && player.userData.vy <= 0) {
                        player.position.y = top + 1.1; player.userData.vy = 0; player.userData.onGround = true;
                    }
                }
            });

            if(keys['Space'] && player.userData.onGround) { player.userData.vy = 0.32; }

            // Camera & Parallax
            camera.position.x += (player.position.x - camera.position.x) * 0.1;
            camera.position.y += (Math.max(4, player.position.y + 1) - camera.position.y) * 0.05;

            // Update Biomes & Backgrounds
            if (!isInside) {
                const px = player.position.x;
                let tOp = 1, flOp = 0, frOp = 0;
                if (px < -BIOME_RANGE) { flOp = Math.min(1, Math.abs(px + BIOME_RANGE)/20); tOp = 1 - flOp; }
                else if (px > BIOME_RANGE) { frOp = Math.min(1, (px - BIOME_RANGE)/20); tOp = 1 - frOp; }

                Object.keys(bgLayers).forEach(k => {
                    const layer = bgLayers[k];
                    const target = (k === 'town' ? tOp : (k === 'forestLeft' ? flOp : frOp));
                    layer.children.forEach(m => {
                        m.material.opacity = THREE.MathUtils.lerp(m.material.opacity, target, 0.05);
                        // FIXED VERTICAL: Height logic to keep backgrounds relative to world floor
                        m.position.y = 3.8 + (camera.position.y - 5) * 0.2; 
                        // Horizontal Parallax (Very slight to keep world feeling connected)
                        if (!m.userData.startX) m.userData.startX = m.position.x;
                        m.position.x = m.userData.startX + (camera.position.x * 0.85);
                    });
                });
            }

            // NPC Interaction Check
            let interacting = false;
            npcs.forEach(n => {
                if(n.group.visible && player.position.distanceTo(n.sprite.position) < 2.5) interacting = true;
            });
            if(!isInside && Math.abs(player.position.x - (pubBuilding.position.x - 1.2)) < 1.5) interacting = true;
            else if(isInside && Math.abs(player.position.x - (-8)) < 2) interacting = true;

            interactSprite.visible = interacting;
            if(interacting) interactSprite.position.set(player.position.x, player.position.y + 1.6, 3);

            // Enemies
            if(!isInside) {
                enemies.forEach(en => {
                    en.position.x += 0.04 * en.userData.dir;
                    if(Math.abs(en.position.x - en.userData.startX) > en.userData.range) en.userData.dir *= -1;
                    if(player.position.distanceTo(en.position) < 1.2) triggerRespawn();
                });
            }

            if(player.position.y < -10) triggerRespawn();
            
            updateUI();
            renderer.render(scene, camera);
        }

        function handleInteraction() {
            if(isPaused) return;
            if (!isInside && Math.abs(player.position.x - (pubBuilding.position.x - 1.2)) < 1.5) {
                transition(true);
            } else if (isInside && Math.abs(player.position.x - (-8)) < 2) {
                transition(false);
            }

            npcs.forEach(n => {
                if(n.group.visible && player.position.distanceTo(n.sprite.position) < 2.5) {
                    if(n.sprite.userData.type === 'shop') document.getElementById('shop-ui').style.display = 'block';
                    else showMessage(n.sprite.userData.msg);
                }
            });
        }

        function transition(toInside) {
            const fade = document.getElementById('fade-overlay');
            fade.style.opacity = '1';
            setTimeout(() => {
                isInside = toInside;
                worldGroup.visible = !toInside;
                interiorGroup.visible = toInside;
                player.position.set(toInside ? -6 : pubBuilding.position.x - 1.2, 2, 2);
                fade.style.opacity = '0';
            }, 500);
        }

        function triggerRespawn() {
            const fade = document.getElementById('fade-overlay');
            fade.style.opacity = '1';
            setTimeout(() => {
                isInside = false; worldGroup.visible = true; interiorGroup.visible = false;
                player.position.set(townCenter, 5, 2); player.userData.vy = 0;
                fade.style.opacity = '0';
            }, 1000);
        }

        function shoot() {
            const b = new THREE.Sprite(MATERIALS.bullet);
            b.position.copy(player.position); b.scale.set(0.6, 0.6, 1);
            b.userData = { vx: player.userData.facingRight ? 0.4 : -0.4 };
            projectiles.push(b); scene.add(b);
            // Simple removal
            setTimeout(() => { scene.remove(b); projectiles = projectiles.filter(p => p !== b); }, 2000);
        }

        function updateUI() {
            document.getElementById('gold-val').innerText = stats.gold;
            document.getElementById('pot-val').innerText = stats.potions;
        }

        function showMessage(m) { const d = document.createElement('div'); d.className="fixed bottom-20 left-1/2 -translate-x-1/2 bg-white p-4 rounded-xl text-black z-[1000]"; d.innerText=m; document.body.appendChild(d); setTimeout(()=>d.remove(), 2000); }
        function buyItem(id, p) { if(stats.gold >= p) { stats.gold -= p; if(id==='potion') stats.potions++; if(id==='boots') stats.speedMult=1.5; } else showMessage("Not enough gold!"); }
        function onNewGame() { document.getElementById('menu-screen').style.display = 'none'; startGame(); }
        function startGame() { gameActive = true; document.getElementById('game-ui').classList.remove('hidden'); }
        function openOptions() { document.getElementById('options-overlay').style.display = 'flex'; isPaused = true; }
        function closeOptions() { document.getElementById('options-overlay').style.display = 'none'; isPaused = false; }
        function closeShop() { document.getElementById('shop-ui').style.display = 'none'; }
        function onResize() { 
            const aspect = window.innerWidth / window.innerHeight; 
            camera.left = -VIEW_SIZE * aspect; camera.right = VIEW_SIZE * aspect; 
            camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); 
        }

        window.onload = init;
    </script>
</body>
</html>
