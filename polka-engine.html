<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Sprite Engine - WebGL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Luckiest Guy', cursive; }
        canvas { display: block; }
        
        .full-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
        }

        #menu-screen {
            background-image: url('https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-start-screen.png');
            background-size: cover;
            background-position: center;
            z-index: 300;
            pointer-events: auto;
            justify-content: flex-end;
            padding-bottom: 8vh;
        }

        .menu-card {
            background: rgba(0, 0, 0, 0.6);
            padding: 1rem 2rem;
            border-radius: 50px;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: row;
            gap: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .menu-btn {
            padding: 0.5rem 1.5rem;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            pointer-events: auto;
            white-space: nowrap;
            text-shadow: 2px 2px 0px #000;
        }

        .menu-btn:hover {
            transform: scale(1.2) rotate(-2deg);
            color: #22d3ee;
            text-shadow: 4px 4px 0px rgba(34, 211, 238, 0.3);
            background: transparent;
        }

        #intro-overlay {
            background: black;
            z-index: 200;
            display: none;
            pointer-events: auto;
        }
        
        #intro-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
        }

        #boss-hp-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            display: none;
        }

        .hp-bar {
            height: 20px;
            background: #441111;
            border: 3px solid white;
            border-radius: 10px;
            overflow: hidden;
        }

        #hp-fill {
            height: 100%;
            background: #ff0000;
            width: 100%;
            transition: width 0.3s;
        }

        #message-box {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #facc15;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.2rem;
            display: none;
        }
    </style>
</head>
<body>

    <div id="menu-screen" class="full-overlay">
        <div class="menu-card">
            <button onclick="onNewGame()" class="menu-btn">New Game</button>
            <button onclick="showMessage('Save disabled in Demo')" class="menu-btn">Load Game</button>
            <button onclick="showMessage('Graphics: Ultra')" class="menu-btn">Options</button>
        </div>
    </div>

    <div id="intro-overlay" class="full-overlay">
        <video id="intro-video" preload="auto">
            <source src="https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-start-screen-grok.mp4" type="video/mp4">
        </video>
    </div>

    <div id="game-ui" class="hidden">
        <div id="level-name" class="text-3xl text-cyan-400">Level 1: WebGL 2D Sprite World</div>
        <div class="text-sm opacity-80">WASD to Move | Space to Jump | Click to Shoot</div>
    </div>

    <div id="boss-hp-container">
        <div class="text-center text-white mb-1 uppercase">Gyarados Overlord</div>
        <div class="hp-bar"><div id="hp-fill"></div></div>
    </div>

    <div id="message-box"></div>

    <script>
        // --- CONFIG & STATE ---
        let scene, camera, renderer, clock;
        let player, enemies = [], platforms = [], projectiles = [], boss = null;
        let keys = {};
        let gameActive = false;
        let worldWidth = 1000;
        
        const textureLoader = new THREE.TextureLoader();
        const SPRITES = {
            player: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/25.png',
            enemy: 'https://raw.githubusercontent.com/pokeapi/sprites/master/sprites/pokemon/129.png',
            grass: 'https://raw.githubusercontent.com/Aris-F/Pixel-Art-Assets/main/Tiles/Grass.png',
            brick: 'https://raw.githubusercontent.com/Aris-F/Pixel-Art-Assets/main/Tiles/Brick.png',
            bullet: 'https://raw.githubusercontent.com/Aris-F/Pixel-Art-Assets/main/Items/Coin.png'
        };

        const PLAYER_SPEED = 0.15;
        const JUMP_FORCE = 0.32;
        const GRAVITY = -0.015;

        // --- INITIALIZATION ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);

            const aspect = window.innerWidth / window.innerHeight;
            const viewSize = 10;
            camera = new THREE.OrthographicCamera(
                -viewSize * aspect, viewSize * aspect,
                viewSize, -viewSize,
                0.1, 1000
            );
            camera.position.set(0, 5, 10);
            camera.lookAt(0, 5, 0);

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 1.0);
            scene.add(ambient);

            clock = new THREE.Clock();

            createLevel();
            createPlayer();
            
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', e => keys[e.code] = true);
            window.addEventListener('keyup', e => keys[e.code] = false);
            window.addEventListener('mousedown', shoot);

            animate();
        }

        function createPlayer() {
            const texture = textureLoader.load(SPRITES.player);
            texture.magFilter = THREE.NearestFilter;
            const material = new THREE.SpriteMaterial({ map: texture });
            player = new THREE.Sprite(material);
            player.scale.set(1.5, 1.5, 1);
            player.position.set(0, 6, 0); // Start high
            player.userData = { vy: 0, onGround: false, radius: 0.6 };
            scene.add(player);
        }

        function createLevel() {
            // Main Floor
            const grassTex = textureLoader.load(SPRITES.grass);
            grassTex.wrapS = THREE.RepeatWrapping;
            grassTex.wrapT = THREE.RepeatWrapping;
            grassTex.repeat.set(worldWidth / 2, 1);
            grassTex.magFilter = THREE.NearestFilter;
            
            const groundGeo = new THREE.PlaneGeometry(worldWidth, 2);
            const groundMat = new THREE.MeshBasicMaterial({ map: grassTex, transparent: true });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.position.set(0, 1, 0); // Center at y=1 means top is at y=2
            scene.add(ground);
            platforms.push(ground);

            // Floating Platforms
            const brickTex = textureLoader.load(SPRITES.brick);
            brickTex.magFilter = THREE.NearestFilter;
            
            for(let i=0; i < 80; i++) {
                const x = (Math.random() * worldWidth) - (worldWidth/2);
                if (Math.abs(x) < 5) continue; 
                
                const y = Math.random() * 8 + 4;
                const width = 3;
                
                const platGeo = new THREE.PlaneGeometry(width, 1);
                const platMat = new THREE.MeshBasicMaterial({ map: brickTex, transparent: true });
                const plat = new THREE.Mesh(platGeo, platMat);
                plat.position.set(x, y, 0);
                scene.add(plat);
                platforms.push(plat);

                if(Math.random() > 0.6) spawnEnemy(x, y + 1.2);
            }
        }

        function spawnEnemy(x, y) {
            const texture = textureLoader.load(SPRITES.enemy);
            texture.magFilter = THREE.NearestFilter;
            const material = new THREE.SpriteMaterial({ map: texture });
            const enemy = new THREE.Sprite(material);
            enemy.position.set(x, y, 0);
            enemy.scale.set(1.2, 1.2, 1);
            enemy.userData = { speed: 0.04 + Math.random() * 0.03, range: 4, startX: x };
            scene.add(enemy);
            enemies.push(enemy);
        }

        function shoot() {
            if(!gameActive) return;
            const texture = textureLoader.load(SPRITES.bullet);
            texture.magFilter = THREE.NearestFilter;
            const mat = new THREE.SpriteMaterial({ map: texture });
            const bullet = new THREE.Sprite(mat);
            bullet.position.copy(player.position);
            bullet.scale.set(0.6, 0.6, 1);
            bullet.userData = { vx: player.scale.x > 0 ? 0.4 : -0.4 }; 
            scene.add(bullet);
            projectiles.push(bullet);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!gameActive) {
                renderer.render(scene, camera);
                return;
            }

            const delta = clock.getDelta();

            // Player Movement
            if (keys['KeyA'] || keys['ArrowLeft']) {
                player.position.x -= PLAYER_SPEED;
                player.scale.x = -1.5;
            }
            if (keys['KeyD'] || keys['ArrowRight']) {
                player.position.x += PLAYER_SPEED;
                player.scale.x = 1.5;
            }
            
            player.userData.vy += GRAVITY;
            player.position.y += player.userData.vy;

            // Collision logic
            player.userData.onGround = false;
            const pX = player.position.x;
            const pY = player.position.y;
            const pRadius = 0.75; // Matches half of scale.y (1.5)

            platforms.forEach(p => {
                const pWidth = p.geometry.parameters.width;
                const pHeight = p.geometry.parameters.height;
                
                const left = p.position.x - pWidth/2;
                const right = p.position.x + pWidth/2;
                const top = p.position.y + pHeight/2;

                // Horizontal AABB check
                if (pX > left - 0.5 && pX < right + 0.5) {
                    // Vertical check for landing
                    if (pY - pRadius <= top && pY > p.position.y && player.userData.vy <= 0) {
                        player.position.y = top + pRadius;
                        player.userData.vy = 0;
                        player.userData.onGround = true;
                    }
                }
            });

            if ((keys['Space'] || keys['KeyW'] || keys['ArrowUp']) && player.userData.onGround) {
                player.userData.vy = JUMP_FORCE;
            }

            // Enemies
            enemies.forEach(en => {
                en.position.x += en.userData.speed;
                if(Math.abs(en.position.x - en.userData.startX) > en.userData.range) en.userData.speed *= -1;
                if(player.position.distanceTo(en.position) < 0.9) gameOver();
            });

            // Projectiles
            projectiles.forEach((p, idx) => {
                p.position.x += p.userData.vx;
                enemies.forEach((en, eIdx) => {
                    if(p.position.distanceTo(en.position) < 0.9) {
                        scene.remove(en);
                        enemies.splice(eIdx, 1);
                        scene.remove(p);
                        projectiles.splice(idx, 1);
                    }
                });
                if(Math.abs(p.position.x - player.position.x) > 30) {
                    scene.remove(p);
                    projectiles.splice(idx, 1);
                }
            });

            // Camera follow
            camera.position.x += (player.position.x - camera.position.x) * 0.1;
            
            // Death plane
            if(player.position.y < -10) gameOver();

            renderer.render(scene, camera);
        }

        function onNewGame() {
            document.getElementById('menu-screen').style.display = 'none';
            const introOverlay = document.getElementById('intro-overlay');
            const introVideo = document.getElementById('intro-video');
            
            introOverlay.style.display = 'flex';
            introVideo.play().catch(e => { closeIntro(); });
            introVideo.onended = () => { closeIntro(); };
        }

        function closeIntro() {
            const introVideo = document.getElementById('intro-video');
            introVideo.pause();
            document.getElementById('intro-overlay').style.display = 'none';
            startGame();
        }

        function startGame() {
            document.getElementById('game-ui').classList.remove('hidden');
            gameActive = true;
        }

        function gameOver() {
            gameActive = false;
            showMessage("GAME OVER - RELOADING...");
            setTimeout(() => location.reload(), 2000);
        }

        function showMessage(txt) {
            const box = document.getElementById('message-box');
            box.innerText = txt;
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 2000);
        }

        function onWindowResize() {
            const aspect = window.innerWidth / window.innerHeight;
            const viewSize = 10;
            camera.left = -viewSize * aspect;
            camera.right = viewSize * aspect;
            camera.top = viewSize;
            camera.bottom = -viewSize;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
</html>
