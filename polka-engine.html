<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Peyote - Pub Update</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Luckiest Guy', cursive; }
        canvas { display: block; }
        
        .full-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
        }

        #menu-screen {
            background: #1e3a8a;
            z-index: 300;
            pointer-events: auto;
            justify-content: center;
        }

        .menu-card {
            background: rgba(0, 0, 0, 0.7);
            padding: 2rem;
            border-radius: 50px;
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            align-items: center;
        }

        .menu-btn {
            padding: 0.5rem 1.5rem;
            background: transparent;
            border: none;
            color: white;
            font-size: 2rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s;
            text-shadow: 2px 2px 0px #000;
        }

        .menu-btn:hover { transform: scale(1.1); color: #22d3ee; }

        #game-ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
            display: flex;
            flex-direction: column; gap: 5px;
        }

        .interaction-ui {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 10, 5, 0.95);
            border: 4px solid #facc15;
            padding: 2rem;
            border-radius: 20px;
            color: white;
            display: none;
            z-index: 500;
            pointer-events: auto;
            min-width: 320px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #443322;
        }

        .buy-btn {
            background: #16a34a;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-family: sans-serif;
            font-weight: bold;
        }

        #transition-overlay {
            position: fixed;
            inset: 0;
            background: black;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            z-index: 1000;
        }

        #interaction-prompt {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            padding: 5px 15px;
            border-radius: 20px;
            display: none;
            z-index: 200;
        }
    </style>
</head>
<body onclick="tryStartMenuMusic()">

    <audio id="menu-music" loop>
        <source src="https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/don-peyote-theme.mp3" type="audio/mpeg">
    </audio>
    <audio id="game-music" loop>
        <source src="https://raw.githubusercontent.com/theghastlygnat/don-peyote/master/assets/Whispers_of_the_Verdant_Keep.mp3" type="audio/mpeg">
    </audio>

    <div id="transition-overlay"></div>

    <div id="menu-screen" class="full-overlay">
        <h1 class="text-6xl text-white mb-8 text-center" style="text-shadow: 4px 4px 0px #000;">DON PEYOTE</h1>
        <div class="menu-card">
            <button onclick="onNewGame()" class="menu-btn">Play Game</button>
        </div>
    </div>

    <div id="game-ui" class="hidden">
        <div id="zone-display" class="text-3xl text-cyan-400">SpriteVille</div>
        <div id="stats" class="text-xl">Gold: <span id="gold-val">100</span> | Beers: <span id="beer-val">0</span></div>
        <div class="text-sm opacity-80">WASD: Move | Space: Jump | E: Interact</div>
    </div>

    <div id="shop-ui" class="interaction-ui">
        <h2 id="shop-title" class="text-3xl text-yellow-500 mb-4 text-center">Pub Menu</h2>
        <div id="shop-items-container"></div>
        <button class="mt-6 w-full py-2 bg-red-700 rounded-lg" onclick="closeInteractionUI()">Exit</button>
    </div>

    <div id="interaction-prompt">Press 'E'</div>

    <script>
        // SVG Data URL Assets for 100% reliability
        const ASSETS = {
            player: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMjgiIGhlaWdodD0iMTI4IiB2aWV3Qm94PSIwIDAgMTI4IDEyOCI+PHJlY3QgeD0iNDAiIHk9IjMwIiB3aWR0aD0iNDgiIGhlaWdodD0iODAiIGZpbGw9IiNmZjAwMDAiLz48cmVjdCB4PSI0NSIgeT0iNDAiIHdpZHRoPSIxMCIgaGVpZ2h0PSIxMCIgZmlsbD0id2hpdGUiLz48cmVjdCB4PSI3NSIgeT0iNDAiIHdpZHRoPSIxMCIgaGVpZ2h0PSIxMCIgZmlsbD0id2hpdGUiLz48L3N2Zz4=',
            pub: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNTYiIGhlaWdodD0iMjU2IiB2aWV3Qm94PSIwIDAgMjU2IDI1NiI+PHJlY3QgeD0iMjAiIHk9IjgwIiB3aWR0aD0iMjE2IiBoZWlnaHQ9IjE1NiIgZmlsbD0iIzRiMmYxZSIvPjxwYXRoIGQ9Ik0wIDEwMCBMMTI4IDAgTDI1NiAxMDAgWiIgZmlsbD0iIzI2MTQwZSIvPjxyZWN0IHg9IjEwMCIgeT0iMTYwIiB3aWR0aD0iNTYiIGhlaWdodD0iNzYiIGZpbGw9IiNhMDUyMmQiLz48L3N2Zz4=',
            grass: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI2NCIgaGVpZ2h0PSI2NCIgdmlld0JveD0iMCAwIDY0IDY0Ij48cmVjdCB3aWR0aD0iNjQiIGhlaWdodD0iNjQiIGZpbGw9IiMyMjhCMjIiLz48cGF0aCBkPSJNMTYgNjQgTDIwIDQ4IE0zMiA2NCBMMzIgMzIgTTQ4IDY0IEw0NCA0OCIgc3Ryb2tlPSIjM2NiMzc0IiBzdHJva2Utd2lkdGg9IjQiLz48L3N2Zz4=',
            npc: 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMjgiIGhlaWdodD0iMTI4IiB2aWV3Qm94PSIwIDAgMTI4IDEyOCI+PGNpcmNsZSBjeD0iNjQiIGN5PSI2NCIgcj0iNTAiIGZpbGw9IiNmZmRhNWIiLz48Y2lyY2xlIGN4PSI0NSIgY3k9IjUwIiByPSI1IiBmaWxsPSJibGFjayIvPjxjaXJjbGUgY3g9Ijg0IiBjeT0iNTAiIHI9IjUiIGZpbGw9ImJsYWNrIi8+PHJlY3QgeD0iNDQiIHk9Ijg1IiB3aWR0aD0iNDAiIGhlaWdodD0iNSIgZmlsbD0iYmxhY2siLz48L3N2Zz4='
        };

        let audioCtx, globalMusicVol = 0.4, gameActive = false, isPaused = false;

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function tryStartMenuMusic() {
            initAudio();
            const m = document.getElementById('menu-music');
            if (m.paused && !gameActive) { m.volume = globalMusicVol; m.play().catch(()=>{}); }
        }

        const sfx = {
            collect: () => playSfx(800, 'sine', 0.2, 0.1),
            door: () => playSfx(120, 'square', 0.3, 0.15)
        };

        function playSfx(freq, type, duration, vol) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        let scene, camera, renderer, clock;
        let player, platforms = [], npcs = [], pubBuilding = null;
        let keys = {};
        let currentZone = 'town';
        let stats = { gold: 100, beers: 0 };
        const VIEW_SIZE = 4.5;
        const textureLoader = new THREE.TextureLoader();

        function createMat(dataUrl) {
            const tex = textureLoader.load(dataUrl);
            tex.magFilter = THREE.NearestFilter;
            return new THREE.SpriteMaterial({ map: tex, transparent: true });
        }

        let MATERIALS = {};

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.OrthographicCamera(-VIEW_SIZE * aspect, VIEW_SIZE * aspect, VIEW_SIZE, -VIEW_SIZE, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            
            MATERIALS = {
                player: createMat(ASSETS.player),
                pub: createMat(ASSETS.pub),
                grass: createMat(ASSETS.grass),
                npc: createMat(ASSETS.npc)
            };

            loadTown();
            createPlayer();

            window.onkeydown = e => { 
                keys[e.code] = true; 
                if(e.code === 'KeyE') handleInteraction();
            };
            window.onkeyup = e => keys[e.code] = false;
            window.onresize = () => {
                const aspect = window.innerWidth / window.innerHeight;
                camera.left = -VIEW_SIZE * aspect;
                camera.right = VIEW_SIZE * aspect;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            };

            animate();
        }

        function createPlayer() {
            player = new THREE.Sprite(MATERIALS.player);
            player.scale.set(1.5, 1.5, 1);
            player.position.set(0, 5, 2);
            player.userData = { vy: 0, facingR: true };
            scene.add(player);
        }

        function clearScene() {
            platforms.forEach(p => scene.remove(p));
            npcs.forEach(n => scene.remove(n));
            if(pubBuilding) scene.remove(pubBuilding);
            platforms = []; npcs = []; pubBuilding = null;
        }

        function loadTown() {
            clearScene();
            currentZone = 'town';
            scene.background = new THREE.Color(0x87CEEB);
            
            addPlatform(0, 0, 100, 2);
            for(let x=-20; x<20; x+=2) {
                const g = new THREE.Sprite(MATERIALS.grass);
                g.scale.set(2, 2, 1); g.position.set(x, 0, 1); scene.add(g);
            }

            pubBuilding = new THREE.Sprite(MATERIALS.pub);
            pubBuilding.scale.set(5, 5, 1);
            pubBuilding.position.set(-8, 3.5, 0.5);
            scene.add(pubBuilding);
            
            document.getElementById('zone-display').innerText = "SpriteVille";
        }

        function loadPubInterior() {
            clearScene();
            currentZone = 'pub';
            scene.background = new THREE.Color(0x1a0f00);
            addPlatform(0, 0, 20, 2);
            
            const bk = new THREE.Sprite(MATERIALS.npc);
            bk.scale.set(2, 2, 1);
            bk.position.set(4, 2, 1);
            bk.userData = { type: 'barkeeper' };
            npcs.push(bk);
            scene.add(bk);

            const exit = new THREE.Sprite(MATERIALS.pub);
            exit.scale.set(3, 3, 1);
            exit.position.set(-7, 2.5, 0.1);
            exit.userData = { type: 'exit' };
            npcs.push(exit);
            scene.add(exit);

            document.getElementById('zone-display').innerText = "The Rusty Sprite Pub";
        }

        function addPlatform(x, y, w, h) {
            const p = new THREE.Mesh(new THREE.PlaneGeometry(w, h), new THREE.MeshBasicMaterial({color: 0x443322}));
            p.position.set(x, y, 0);
            platforms.push(p);
            scene.add(p);
        }

        function handleInteraction() {
            if(isPaused || !gameActive) return;

            if(currentZone === 'town' && pubBuilding) {
                if(Math.abs(player.position.x - pubBuilding.position.x) < 2) {
                    transitionZone('pub');
                    return;
                }
            }

            npcs.forEach(n => {
                if(player.position.distanceTo(n.position) < 2) {
                    if(n.userData.type === 'barkeeper') openPubMenu();
                    if(n.userData.type === 'exit') transitionZone('town');
                }
            });
        }

        function transitionZone(target) {
            const ov = document.getElementById('transition-overlay');
            ov.style.opacity = 1;
            sfx.door();
            setTimeout(() => {
                if(target === 'pub') {
                    loadPubInterior();
                    player.position.set(-6, 5, 2);
                } else {
                    loadTown();
                    player.position.set(-8, 5, 2);
                }
                ov.style.opacity = 0;
            }, 500);
        }

        function openPubMenu() {
            isPaused = true;
            const ui = document.getElementById('shop-ui');
            const container = document.getElementById('shop-items-container');
            ui.style.display = 'block';
            container.innerHTML = `
                <div class="shop-item">
                    <div><p class="text-xl">Frosty Ale</p></div>
                    <button class="buy-btn" onclick="buyBeer(5)">5 Gold</button>
                </div>
            `;
        }

        function buyBeer(price) {
            if(stats.gold >= price) {
                stats.gold -= price;
                stats.beers++;
                sfx.collect();
                updateUI();
            }
        }

        function closeInteractionUI() {
            document.getElementById('shop-ui').style.display = 'none';
            isPaused = false;
        }

        function updateUI() {
            document.getElementById('gold-val').innerText = stats.gold;
            document.getElementById('beer-val').innerText = stats.beers;
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!gameActive || isPaused) {
                renderer.render(scene, camera);
                return;
            }

            const spd = 0.12;
            if(keys['KeyA']) player.position.x -= spd;
            if(keys['KeyD']) player.position.x += spd;

            player.userData.vy -= 0.015;
            player.position.y += player.userData.vy;

            if(player.position.y < 2.1) {
                player.position.y = 2.1;
                player.userData.vy = 0;
                if(keys['Space']) player.userData.vy = 0.3;
            }

            let near = false;
            if(currentZone === 'town' && Math.abs(player.position.x - pubBuilding.position.x) < 2) near = true;
            npcs.forEach(n => { if(player.position.distanceTo(n.position) < 2) near = true; });
            document.getElementById('interaction-prompt').style.display = near ? 'block' : 'none';

            camera.position.x += (player.position.x - camera.position.x) * 0.1;
            renderer.render(scene, camera);
        }

        function onNewGame() {
            gameActive = true;
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-ui').classList.remove('hidden');
            document.getElementById('game-music').play();
            document.getElementById('menu-music').pause();
        }

        window.onload = init;
    </script>
</body>
</html>
